    /**
     * Helper to format Decimal Rate
     */
    function formatDecRate(rawRate) {
        if (rawRate === null || rawRate === undefined) return '-';
        if (typeof rawRate === 'number' || !isNaN(parseFloat(rawRate))) {
            const num = parseFloat(rawRate);
            if (num <= 1 && num >= 0 && (rawRate.toString().indexOf('%') === -1)) {
                return Math.round(num * 100) + '%';
            }
        }
        return rawRate;
    }

    /**
     * 渲染講題編輯表格 (唯讀顯示)
     * @param {Array} topics 回傳的講題資料陣列
     */
    function renderParentingTopicsTable(topics) {
        const tbody = document.getElementById('parentingTopicsTableBody');
        tbody.innerHTML = '';

        // 取得當前選擇的西元年
        const yearSelectVal = document.getElementById('parentingYear').value;

        topics.forEach((item, index) => {
            const tr = document.createElement('tr');
            
            // 幫助建立純文字儲存格的輔助選單
            const createTextCell = (text, isCenter = true, extraClass = '') => {
                const td = document.createElement('td');
                td.textContent = (text === null || text === undefined || text === '') ? '-' : text;
                if (isCenter) {
                    td.style.textAlign = 'center';
                }
                if (extraClass) td.className = extraClass;
                return td;
            };

            // 1. 場次日期與問卷狀態
            const mmStr = String(item.month).padStart(2, '0');
            let dateStr = '-';
            if (item.date) {
                const parts = item.date.split('-');
                if (parts.length === 3) {
                    dateStr = `${yearSelectVal}/${mmStr}/${parseInt(parts[2], 10)}`;
                } else {
                    dateStr = item.date; // fallback
                }
            } else {
                dateStr = `${yearSelectVal}/${mmStr}/`; // 尚未輸入日期
            }

            // 加上狀態圖示
            const surveyIcon = item.hasSurvey ? '✅' : '⬜';
            const statusHtml = `<span style="font-size: 0.9em; margin-right: 4px;" title="問卷狀態">${surveyIcon}</span>`;
            
            const tdDate = document.createElement('td');
            tdDate.innerHTML = statusHtml + dateStr;
            tdDate.style.textAlign = 'center';

            // 2. 講題
            const tdTopic = createTextCell(item.topic, false);

            // 數字資料
            const tdContact = createTextCell(item.contactCount === 0 ? '0' : item.contactCount, true, 'exec-stats-col');
            const tdSign = createTextCell(item.signCount === 0 ? '0' : item.signCount, true, 'exec-stats-col');
            const tdAttend = createTextCell(item.attendCount === 0 ? '0' : item.attendCount, true, 'exec-stats-col');
            
            // 處理出席率
            let finalRate = item.attendRate || '-';
            if (item.signCount > 0 && (!item.attendRate || item.attendRate === '-')) {
                finalRate = Math.round(((item.attendCount || 0) / item.signCount) * 100) + '%';
            } else {
                finalRate = formatDecRate(finalRate);
            }
            const tdRate = createTextCell(finalRate, true, 'exec-stats-col');
            tdRate.style.fontWeight = 'bold';

            const tdAppM = createTextCell(item.applicantMale === 0 ? '0' : item.applicantMale, true, 'exec-stats-col');
            const tdAppF = createTextCell(item.applicantFemale === 0 ? '0' : item.applicantFemale, true, 'exec-stats-col');
            const tdResM = createTextCell(item.respondentMale === 0 ? '0' : item.respondentMale, true, 'exec-stats-col');
            const tdResF = createTextCell(item.respondentFemale === 0 ? '0' : item.respondentFemale, true, 'exec-stats-col');
            const tdRelM = createTextCell(item.relatedMale === 0 ? '0' : item.relatedMale, true, 'exec-stats-col');
            const tdRelF = createTextCell(item.relatedFemale === 0 ? '0' : item.relatedFemale, true, 'exec-stats-col');

            // 操作按鈕不需要了，改由點擊整列觸發
            tr.style.cursor = 'pointer';
            tr.onclick = () => openParentingPreviewPanel(index);

            tr.appendChild(tdDate);
            tr.appendChild(tdTopic);
            tr.appendChild(tdContact);
            tr.appendChild(tdSign);
            tr.appendChild(tdAttend);
            tr.appendChild(tdRate);
            tr.appendChild(tdAppM);
            tr.appendChild(tdAppF);
            tr.appendChild(tdResM);
            tr.appendChild(tdResF);
            tr.appendChild(tdRelM);
            tr.appendChild(tdRelF);

            tbody.appendChild(tr);
        });

        // 初始計算一次總計
        calculateParentingTotals(topics);
    }

    /**
     * 計算並更新最下方的統計列
     */
    function calculateParentingTotals(topics) {
        let tContact = 0, tSign = 0, tAttend = 0;
        let tAppM = 0, tAppF = 0, tResM = 0, tResF = 0, tRelM = 0, tRelF = 0;

        topics.forEach(t => {
            tContact += (parseInt(t.contactCount) || 0);
            tSign += (parseInt(t.signCount) || 0);
            tAttend += (parseInt(t.attendCount) || 0);
            tAppM += (parseInt(t.applicantMale) || 0);
            tAppF += (parseInt(t.applicantFemale) || 0);
            tResM += (parseInt(t.respondentMale) || 0);
            tResF += (parseInt(t.respondentFemale) || 0);
            tRelM += (parseInt(t.relatedMale) || 0);
            tRelF += (parseInt(t.relatedFemale) || 0);
        });

        // 更新 UI (直接顯示數值，包括 0)
        document.getElementById('totalContactCount').textContent = tContact;
        document.getElementById('totalSignCount').textContent = tSign;
        document.getElementById('totalAttendCount').textContent = tAttend;

        let tRate = '';
        if (tSign > 0) {
            tRate = Math.round((tAttend / tSign) * 100) + '%';
        } else {
            tRate = '0%'; // 若無報名人數，總結出席率顯示為 0%
        }
        document.getElementById('totalAttendRate').textContent = tRate;

        document.getElementById('totalApplicantMale').textContent = tAppM;
        document.getElementById('totalApplicantFemale').textContent = tAppF;
        document.getElementById('totalRespondentMale').textContent = tResM;
        document.getElementById('totalRespondentFemale').textContent = tResF;
        document.getElementById('totalRelatedMale').textContent = tRelM;
        document.getElementById('totalRelatedFemale').textContent = tRelF;
    }

    // ==================== 場次連接線系統 ====================

    /**
     * 12 個月份的顏色主題
     * 每個月一個主色，用於連接線、端點、指示條
     */
    const MONTH_COLORS = [
        '#E74C3C', // 1月 - 紅
        '#E67E22', // 2月 - 橘
        '#F1C40F', // 3月 - 黃
        '#2ECC71', // 4月 - 綠
        '#1ABC9C', // 5月 - 青綠
        '#3498DB', // 6月 - 藍
        '#2980B9', // 7月 - 深藍
        '#9B59B6', // 8月 - 紫
        '#8E44AD', // 9月 - 深紫
        '#E91E63', // 10月 - 粉紅
        '#795548', // 11月 - 棕
        '#607D8B', // 12月 - 灰藍
    ];

    /**
     * 根據場次日期取得月份索引 (0-11)
     */
    function getMonthFromTopicDate(dateStr) {
        if (!dateStr) return 0;
        const parts = dateStr.split('-'); // 114-02-13 format
        if (parts.length === 3) {
            const month = parseInt(parts[1], 10);
            if (month >= 1 && month <= 12) return month - 1;
        }
        return 0;
    }

    function getMonthColor(monthIndex) {
        return MONTH_COLORS[monthIndex % 12];
    }

    /**
     * 繪製從選中列到預覽面板的連接線
     */
    function drawParentingConnector(selectedRow, dateStr) {
        const svg = document.getElementById('parentingConnectorSvg');
        if (!svg) return;

        while (svg.firstChild) svg.removeChild(svg.firstChild);
        if (!selectedRow) return;

        const container = svg.parentElement;
        if (!container) return;

        const previewPanel = document.getElementById('parentingPreviewPanel');
        if (!previewPanel || previewPanel.style.display === 'none') return;

        // ★ 同步 SVG 尺寸到父容器（解決 resize/DevTools 開關後座標偏移）
        const containerRect = container.getBoundingClientRect();
        const w = Math.round(containerRect.width);
        const h = Math.round(containerRect.height);
        svg.setAttribute('width', w);
        svg.setAttribute('height', h);
        svg.style.width = w + 'px';
        svg.style.height = h + 'px';

        const rowRect = selectedRow.getBoundingClientRect();
        const panelRect = previewPanel.getBoundingClientRect();

        // ★ 邊界保護：元素不可見或已捲出範圍
        if (rowRect.height === 0 || panelRect.height === 0) return;
        if (rowRect.bottom < containerRect.top || rowRect.top > containerRect.bottom) return;

        const startX = rowRect.right - containerRect.left;
        const startY = rowRect.top - containerRect.top + rowRect.height / 2;
        const endX = panelRect.left - containerRect.left;
        const endY = panelRect.top - containerRect.top + 35;

        // ★ 座標合理性檢查（防止負值或面板在列左邊的異常情況）
        if (startX < 0 || startY < 0 || endX < 0 || endY < 0) return;
        if (endX <= startX) return;

        const monthIdx = getMonthFromTopicDate(dateStr);
        const color = getMonthColor(monthIdx);

        const dx = endX - startX;
        const cp1x = startX + dx * 0.4;
        const cp1y = startY;
        const cp2x = startX + dx * 0.6;
        const cp2y = endY;

        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        svg.appendChild(defs);

        const gradientId = 'connGrad_' + Date.now();
        const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
        gradient.setAttribute('id', gradientId);
        gradient.setAttribute('x1', '0%');
        gradient.setAttribute('y1', '0%');
        gradient.setAttribute('x2', '100%');
        gradient.setAttribute('y2', '0%');

        const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        stop1.setAttribute('offset', '0%');
        stop1.setAttribute('stop-color', color);
        stop1.setAttribute('stop-opacity', '0.9');

        const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        stop2.setAttribute('offset', '50%');
        stop2.setAttribute('stop-color', color);
        stop2.setAttribute('stop-opacity', '0.5');

        const stop3 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
        stop3.setAttribute('offset', '100%');
        stop3.setAttribute('stop-color', color);
        stop3.setAttribute('stop-opacity', '0.9');

        gradient.appendChild(stop1);
        gradient.appendChild(stop2);
        gradient.appendChild(stop3);
        defs.appendChild(gradient);

        const pathLength = Math.sqrt(dx * dx + (endY - startY) * (endY - startY)) * 1.3;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('class', 'connector-path');
        path.setAttribute('d', 'M ' + startX + ' ' + startY + ' C ' + cp1x + ' ' + cp1y + ', ' + cp2x + ' ' + cp2y + ', ' + endX + ' ' + endY);
        path.setAttribute('stroke', 'url(#' + gradientId + ')');
        path.setAttribute('stroke-dasharray', pathLength);
        path.setAttribute('stroke-dashoffset', Math.floor(pathLength));
        svg.appendChild(path);

        path.animate([
            { strokeDashoffset: pathLength, opacity: 0.3 },
            { strokeDashoffset: 0, opacity: 1 }
        ], { duration: 400, easing: 'ease-out', fill: 'forwards' });

        const dotStart = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dotStart.setAttribute('class', 'connector-dot-start');
        dotStart.setAttribute('cx', startX);
        dotStart.setAttribute('cy', startY);
        dotStart.setAttribute('r', '0');
        dotStart.setAttribute('fill', color);
        svg.appendChild(dotStart);

        const dotEnd = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dotEnd.setAttribute('class', 'connector-dot-end');
        dotEnd.setAttribute('cx', endX);
        dotEnd.setAttribute('cy', endY);
        dotEnd.setAttribute('r', '0');
        dotEnd.setAttribute('fill', color);
        svg.appendChild(dotEnd);

        const dotAnimFrames = [
            { r: 0, opacity: 0 },
            { r: 5, opacity: 1, offset: 0.6 },
            { r: 3.5, opacity: 1 }
        ];
        const dotAnimOptions = { duration: 350, easing: 'ease-out', fill: 'forwards' };
        dotStart.animate(dotAnimFrames, dotAnimOptions);
        dotEnd.animate(dotAnimFrames, dotAnimOptions);

        selectedRow.style.setProperty('--connector-color', color);
    }

    function clearParentingConnector() {
        const svg = document.getElementById('parentingConnectorSvg');
        if (svg) {
            while (svg.firstChild) {
                svg.removeChild(svg.firstChild);
            }
        }
    }

    let connectorRedrawTimer = null;
    function scheduleConnectorRedraw() {
        if (connectorRedrawTimer) clearTimeout(connectorRedrawTimer);
        connectorRedrawTimer = setTimeout(() => {
            const previewPanel = document.getElementById('parentingPreviewPanel');
            
            // 面板沒開就清除線條
            if (!previewPanel || previewPanel.style.display === 'none') {
                clearParentingConnector();
                return;
            }

            const idxEl = document.getElementById('parentingEditIndex');
            const idxStr = idxEl ? idxEl.value : '';
            
            if (idxStr === '' || !currentParentingTopicsData || currentParentingTopicsData.length === 0) {
                clearParentingConnector();
                return;
            }

            const idx = parseInt(idxStr, 10);
            if (isNaN(idx) || idx < 0 || idx >= currentParentingTopicsData.length) {
                clearParentingConnector();
                return;
            }

            // ★ 用 index 直接取列，不依賴 .selected class
            const tbody = document.getElementById('parentingTopicsTableBody');
            const selectedRow = tbody ? tbody.children[idx] : null;
            
            if (!selectedRow) {
                clearParentingConnector();
                return;
            }

            // ★ 確保選中狀態（DOM 可能被 renderParentingTopicsTable 重建過）
            Array.from(tbody.children).forEach(tr => {
                tr.classList.remove('selected');
                tr.style.backgroundColor = '';
            });
            selectedRow.classList.add('selected');
            selectedRow.style.backgroundColor = '#e8f4f8';

            const item = currentParentingTopicsData[idx];
            drawParentingConnector(selectedRow, item.date || '');
            
            // ★ 多加一個 300ms 後的保險重繪，應對 F12 切換後 layout 延遲Settling 的問題
            setTimeout(() => {
                const refreshedRow = tbody ? tbody.children[idx] : null;
                if (refreshedRow && refreshedRow.classList.contains('selected')) {
                    drawParentingConnector(refreshedRow, item.date || '');
                }
            }, 300);
        }, 80);
    }

    window.addEventListener('resize', scheduleConnectorRedraw);
    document.addEventListener('scroll', function(e) {
        if (e.target && e.target.closest && e.target.closest('#parentingTopicsContainer')) {
            scheduleConnectorRedraw();
        }
    }, true);

    /**
     * 開啟單筆紀錄預覽編輯面板 (側邊欄)
     */
    function openParentingPreviewPanel(index) {
        // 先檢查是否有未存檔資料！這非常重要，否則會直接覆蓋
        if (parentingPanelIsDirty || parentingSurveyIsDirty) {
            const confirmClose = confirm('您有未儲存的變更，確定要放棄變更並切換嗎？');
            if (!confirmClose) return;
            // 使用者同意放棄
            parentingPanelIsDirty = false;
            parentingSurveyIsDirty = false;
        }

        const item = currentParentingTopicsData[index];
        const yearSelectVal = document.getElementById('parentingYear').value;
        const mmStr = String(item.month).padStart(2, '0');

        // ★ 同步載入問卷與統計（背景載入）
        window.currentSurveyMonth = String(item.month);
        onSurveyMonthChanged();

        document.getElementById('parentingEditModalTitle').textContent = `編輯 ${yearSelectVal}年${mmStr}月 初階親職報表`;
        document.getElementById('parentingEditIndex').value = index;
        document.getElementById('parentingEditDatePrefix').textContent = `${yearSelectVal}/${mmStr}/`;

        // 填入既有資料
        if (item.date) {
            const parts = item.date.split('-');
            if (parts.length === 3) {
                document.getElementById('parentingEditDay').value = parseInt(parts[2], 10);
            }
        } else {
            document.getElementById('parentingEditDay').value = '';
        }

        const topicSelect = document.getElementById('parentingEditTopic');
        const customInput = document.getElementById('parentingEditTopicCustom');
        const predefinedTopics = ['別讓孩子捲入父母的衝突', '讓孩子知道我愛他', '如何做友善的父母'];
        
        if (!item.topic) {
            topicSelect.value = '';
            customInput.style.display = 'none';
            customInput.value = '';
        } else if (predefinedTopics.includes(item.topic)) {
            topicSelect.value = item.topic;
            customInput.style.display = 'none';
            customInput.value = '';
        } else {
            topicSelect.value = 'custom';
            customInput.style.display = 'block';
            customInput.value = item.topic;
        }
        document.getElementById('parentingEditContact').value = item.contactCount === 0 ? '0' : (item.contactCount || '');
        document.getElementById('parentingEditSign').value = item.signCount === 0 ? '0' : (item.signCount || '');
        document.getElementById('parentingEditAttend').textContent = item.attendCount === 0 ? '0' : (item.attendCount || '');
        
        // 觸發一次重新計算，以更新出席率文字與環形進度條
        setTimeout(recalcParentingEditRate, 0);

        document.getElementById('parentingEditAppM').value = item.applicantMale === 0 ? '0' : (item.applicantMale || '');
        document.getElementById('parentingEditAppF').value = item.applicantFemale === 0 ? '0' : (item.applicantFemale || '');

    function recalcParentingEditRate() {
        const appM = parseInt(document.getElementById('parentingEditAppM').value) || 0;
        const appF = parseInt(document.getElementById('parentingEditAppF').value) || 0;
        const resM = parseInt(document.getElementById('parentingEditResM').value) || 0;
        const resF = parseInt(document.getElementById('parentingEditResF').value) || 0;
        const relM = parseInt(document.getElementById('parentingEditRelM').value) || 0;
        const relF = parseInt(document.getElementById('parentingEditRelF').value) || 0;

        const totalAttend = appM + appF + resM + resF + relM + relF;
        document.getElementById('parentingEditAttend').textContent = totalAttend === 0 ? '0' : totalAttend;

        const sign = parseInt(document.getElementById('parentingEditSign').value) || 0;
        
        const ringBg = document.getElementById('parentingAttendRingBg');
        if (sign > 0) {
            const rawRate = (totalAttend / sign) * 100;
            const rateStr = Math.round(rawRate) + '%';
            document.getElementById('parentingEditRate').textContent = rateStr;
            
            if (ringBg) {
                // 依據出席率變更顏色 (紅 -> 黃 -> 綠)
                let ringColor = 'var(--primary)';
                if (rawRate < 50) ringColor = '#e74c3c'; // 紅色
                else if (rawRate < 80) ringColor = '#f39c12'; // 橘黃色
                else ringColor = '#2ecc71'; // 綠色

                document.getElementById('parentingEditRate').style.color = ringColor;
                ringBg.style.background = `conic-gradient(${ringColor} ${rawRate}%, #eee ${rawRate}%)`;
            }
        } else {
            document.getElementById('parentingEditRate').textContent = '-';
            document.getElementById('parentingEditRate').style.color = 'var(--primary)';
            if (ringBg) {
                ringBg.style.background = `conic-gradient(#eee 100%, #eee 100%)`;
            }
        }
    }

    /**

    function addSurveyRespondentRow(data) {
        const tbody = document.getElementById('surveyInputBody');
        const tr = document.createElement('tr');
        const rowIdx = tbody.children.length + 1;

        // # 序號
        const tdNum = document.createElement('td');

            const inp = document.createElement('input');

            inp.style.cssText = 'width: 32px; text-align: center; border: 1px solid #ccc; border-radius: 3px; padding: 3px; font-size: 0.9rem;';
            inp.value = (data && data['Q' + q] && data['Q' + q] !== 0) ? data['Q' + q] : '';
            inp.oninput = () => {
                // 只允許空白或 0~5
                const v = inp.value.trim();
                if (v !== '' && (!/^[0-5]$/.test(v))) {
                    inp.value = '';
                    inp.style.borderColor = '#e74c3c';
                    setTimeout(() => { inp.style.borderColor = '#ccc'; }, 600);
                } else {
                    inp.style.borderColor = '#ccc';

            };
            td.appendChild(inp);
            tr.appendChild(td);
        }

        // 刪除按鈕

        tdDel.style.cssText = 'border: 1px solid #ddd; padding: 2px; text-align: center;';

            updateRespondentCount();

        tr.appendChild(tdDel);

        updateRespondentCount();

    /**
     * 批次貼上：從 Excel 複製資料，一次產生多列
     */
    function batchPasteSurvey() {
        // 建立一個簡易的 Modal 對話框
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; display: flex; align-items: center; justify-content: center;';

        const modal = document.createElement('div');
        modal.style.cssText = 'background: #fff; border-radius: 8px; padding: 20px; width: 420px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.25);';
        modal.innerHTML = `
            <h3 style="margin: 0 0 8px 0; font-size: 1rem; color: #333;">📋 批次貼上問卷分數</h3>
            <p style="font-size: 0.8rem; color: #666; margin: 0 0 10px 0; line-height: 1.4;">
              從 Excel 複製 5 欄的分數資料（Q1~Q5），貼到下方。<br>
              每列一位填答者，欄位用 Tab 或空格分隔。<br>
              範例：<code style="background: #f5f5f5; padding: 1px 4px; border-radius: 3px;">5  5  5  5  5</code>
            </p>
            <textarea id="batchPasteArea" rows="10" 
              style="width: 100%; font-family: monospace; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; padding: 8px; resize: vertical;" 
              placeholder="在此貼上資料..."></textarea>
            <div style="margin-top: 10px; display: flex; gap: 8px; justify-content: flex-end;">
              <button id="batchCancelBtn" style="padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer;">取消</button>
              <button id="batchConfirmBtn" style="padding: 6px 14px; border: none; border-radius: 4px; background: #3498db; color: #fff; cursor: pointer; font-weight: bold;">匯入</button>
            </div>
        `;
        overlay.appendChild(modal);
        document.body.appendChild(overlay);

        // 自動 focus 到 textarea
        setTimeout(() => document.getElementById('batchPasteArea').focus(), 100);

        // 取消
        document.getElementById('batchCancelBtn').onclick = () => overlay.remove();
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

        // 匯入
        document.getElementById('batchConfirmBtn').onclick = () => {
            const text = document.getElementById('batchPasteArea').value.trim();
            if (!text) {
                showToast('請先貼上資料', 'warning');
                return;
            }

            const lines = text.split('\n').filter(l => l.trim() !== '');
            let importCount = 0;
            let errorLines = [];

            lines.forEach((line, lineIdx) => {
                // 支援 Tab 或多個空格分隔
                const cols = line.trim().split(/[\t]+|\s{2,}|\s+/).map(s => s.trim());
                if (cols.length < 5) {
                    errorLines.push(lineIdx + 1);
                    return;
                }

                const data = {};
                let valid = true;
                for (let q = 0; q < 5; q++) {
                    const v = parseInt(cols[q]);
                    if (isNaN(v) || v < 0 || v > 5) {
                        valid = false;
                        break;
                    }
                    data['Q' + (q + 1)] = v;
                }

                if (valid) {
                    addSurveyRespondentRow(data);
                    importCount++;
                } else {
                    errorLines.push(lineIdx + 1);
                }
            });

            overlay.remove();
            let msg = `已匯入 ${importCount} 筆填答`;
            if (errorLines.length > 0) {
                msg += `（第 ${errorLines.join(', ')} 列格式有誤，已略過）`;
            }
            showToast(msg, errorLines.length > 0 ? 'warning' : 'success');
        };
    }

            inp.value = (data && data['Q' + q] && data['Q' + q] !== 0) ? data['Q' + q] : '';
            inp.oninput = () => {
                const v = inp.value.trim();
                if (v !== '' && (!/^[1-5]$/.test(v))) {
                    inp.value = '';
                    inp.style.borderColor = '#e74c3c';
                    setTimeout(() => { inp.style.borderColor = '#ccc'; }, 600);
                } else {
                    inp.style.borderColor = '#ccc';
                }
                parentingPostSurveyIsDirty = true;
            };
            td.appendChild(inp);
            tr.appendChild(td);
        }

        // 進一步服務(複選)
        const tdSvc = document.createElement('td');
        tdSvc.style.cssText = 'border: 1px solid #ddd; padding: 4px; font-size: 0.75rem;';
        const svcContainer = document.createElement('div');
        svcContainer.style.cssText = 'display: flex; flex-direction: column; gap: 4px;';

        const mainRow = document.createElement('div');
        mainRow.style.cssText = 'display: flex; gap: 4px; flex-wrap: wrap; align-items: center;';
        
        POST_SURVEY_SERVICE_OPTIONS.forEach(option => {
            const lbl = document.createElement('label');
            lbl.style.cssText = 'display: flex; align-items: center; gap: 2px; cursor: pointer;';
            lbl.title = option.fullLabel;
            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.className = 'post-survey-svc-chk';
            chk.dataset.key = option.key;
            chk.checked = (data && data['轉介_' + option.key]) ? true : false;
            chk.onchange = () => { parentingPostSurveyIsDirty = true; };
            lbl.appendChild(chk);
            lbl.appendChild(document.createTextNode(option.shortLabel));
            mainRow.appendChild(lbl);
        });
        
        const socialRow = document.createElement('div');
        socialRow.style.cssText = 'display: flex; align-items: center; gap: 4px; border-top: 1px dashed #ddd; padding-top: 3px;';
        const socialLabel = document.createElement('span');
        socialLabel.textContent = '社工圈選數';
        socialLabel.style.cssText = 'color: #666; font-size: 0.72rem;';
        const socialCountInput = document.createElement('input');
        socialCountInput.type = 'number';
        socialCountInput.className = 'post-survey-social-count';
        socialCountInput.dataset.key = POST_SURVEY_SOCIAL_COUNT_KEY;
        socialCountInput.min = '0';
        socialCountInput.max = '5';
        socialCountInput.step = '1';
        socialCountInput.value = (data && data[POST_SURVEY_SOCIAL_COUNT_KEY] !== '' && data[POST_SURVEY_SOCIAL_COUNT_KEY] != null)
            ? data[POST_SURVEY_SOCIAL_COUNT_KEY]
            : '';
        socialCountInput.style.cssText = 'width: 52px; text-align: center; border: 1px solid #ccc; border-radius: 3px; padding: 2px; font-size: 0.8rem;';
        socialCountInput.oninput = () => {
            const raw = socialCountInput.value.trim();
            if (raw === '') {
                parentingPostSurveyIsDirty = true;
                return;
            }
            const num = parseInt(raw, 10);
            if (isNaN(num) || num < 0 || num > 5) {
                socialCountInput.value = '';
                socialCountInput.style.borderColor = '#e74c3c';
                setTimeout(() => { socialCountInput.style.borderColor = '#ccc'; }, 600);
            } else {
                socialCountInput.value = String(num);
                socialCountInput.style.borderColor = '#ccc';
            }
            parentingPostSurveyIsDirty = true;
        };
        socialRow.appendChild(socialLabel);
        socialRow.appendChild(socialCountInput);

        svcContainer.appendChild(mainRow);
        svcContainer.appendChild(socialRow);
        tdSvc.appendChild(svcContainer);
        tr.appendChild(tdSvc);

        // 刪除按鈕
        const tdDel = document.createElement('td');
        tdDel.style.cssText = 'border: 1px solid #ddd; padding: 2px; text-align: center;';
        const btnDel = document.createElement('button');
        btnDel.textContent = '✕';
        btnDel.style.cssText = 'background: #e74c3c; color: #fff; border: none; border-radius: 3px; cursor: pointer; padding: 2px 6px; font-size: 0.8rem;';
        btnDel.onclick = () => {
            tr.remove();
            renumberPostSurveyRows();
            updatePostSurveyRespondentCount();
            parentingPostSurveyIsDirty = true;
        };
        tdDel.appendChild(btnDel);
        tr.appendChild(tdDel);

        tbody.appendChild(tr);
        updatePostSurveyRespondentCount();
        parentingPostSurveyIsDirty = true;
    }

    function renumberPostSurveyRows() {
        const rows = document.querySelectorAll('#postSurveyInputBody tr');
        rows.forEach((tr, idx) => {
            const numTd = tr.querySelector('.post-survey-row-num');
            if (numTd) numTd.textContent = idx + 1;
        });
    }

    function updatePostSurveyRespondentCount() {
        const count = document.querySelectorAll('#postSurveyInputBody tr').length;
        const el = document.getElementById('postSurveyRespondentCount');
        if (el) el.textContent = count;
    }

    function batchPastePostSurvey() {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9999; display: flex; align-items: center; justify-content: center;';

        const modal = document.createElement('div');
        modal.style.cssText = 'background: #fff; border-radius: 8px; padding: 20px; width: 450px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.25);';
        modal.innerHTML = `
            <h3 style="margin: 0 0 8px 0; font-size: 1rem; color: #333;">📋 批次貼上課後問卷</h3>
            <p style="font-size: 0.8rem; color: #666; margin: 0 0 10px 0; line-height: 1.4;">
              僅支援 12欄：Q1~Q7 + 社工圈選數 + 婚姻諮商 + 個人心理諮商 + 家事商談 + 兒少心理團體。<br>
              欄位順序（12欄）為：社工圈選數、婚姻諮商、個人心理諮商、家事商談、兒少心理團體。<br>
              Q1~Q7 分數必須是 1~5，不可空白。<br>
              轉介勾選可用「1」、「V」、「有」；社工圈選數請填 0~5。<br>
              範例(12欄)：<code style="background: #f5f5f5; padding: 1px 4px; border-radius: 3px;">5 5 5 5 5 5 5 4 1 0 0 0</code>
            </p>
            <textarea id="postBatchPasteArea" rows="10" 
              style="width: 100%; font-family: monospace; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; padding: 8px; resize: vertical;" 
              placeholder="在此貼上資料..."></textarea>
            <div style="margin-top: 10px; display: flex; gap: 8px; justify-content: flex-end;">
              <button id="postBatchCancelBtn" style="padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer;">取消</button>
              <button id="postBatchConfirmBtn" style="padding: 6px 14px; border: none; border-radius: 4px; background: #3498db; color: #fff; cursor: pointer; font-weight: bold;">匯入</button>
            </div>
        `;
        overlay.appendChild(modal);
        document.body.appendChild(overlay);

        setTimeout(() => document.getElementById('postBatchPasteArea').focus(), 100);

        document.getElementById('postBatchCancelBtn').onclick = () => overlay.remove();
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

        document.getElementById('postBatchConfirmBtn').onclick = () => {
            const text = document.getElementById('postBatchPasteArea').value.trim();
            if (!text) {
                showToast('請先貼上資料', 'warning');
                return;
            }

            const lines = text.split('\n').filter(l => l.trim() !== '');
            let importCount = 0;
            let errorLines = [];

            lines.forEach((line, lineIdx) => {
                const cols = line.trim().split(/[\t]+|\s{2,}|\s+/).map(s => s.trim());
                if (cols.length !== 12) {
                    errorLines.push(lineIdx + 1);
                    return;
                }

                const data = {};
                let valid = true;
                const parseChecked = (raw) => {
                    const v = raw ? raw.toUpperCase() : '';
                    return (v === '1' || v === 'V' || v === '有' || v === 'TRUE' || v === 'Y');
                };
                const parseSocialCount = (raw) => {
                    if (raw == null || raw === '') return 0;
                    if (parseChecked(raw)) return 1;
                    const n = parseInt(raw, 10);
                    if (isNaN(n) || n < 0 || n > 5) return null;
                    return n;
                };

                // Q1 - Q7
                for (let q = 0; q < 7; q++) {
                    const v = parseInt(cols[q]);
                    if (isNaN(v) || v < 1 || v > 5) {
                        valid = false;
                        break;
                    }
                    data['Q' + (q + 1)] = v;
                }

                // 社工圈選數
                let socialCount = 0;
                const parsedCount = parseSocialCount(cols[7]);
                if (parsedCount == null) valid = false;
                else socialCount = parsedCount;

                // 4 個轉介欄位（婚姻 / 個諮 / 家事 / 兒少）
                for (let s = 0; s < POST_SURVEY_SERVICE_OPTIONS.length; s++) {
                    const isChecked = parseChecked(cols[8 + s]);
                    data['轉介_' + POST_SURVEY_SERVICE_OPTIONS[s].key] = isChecked ? 1 : '';
                }
                if (valid) {
                    data[POST_SURVEY_SOCIAL_COUNT_KEY] = socialCount > 0 ? socialCount : '';
                }

                if (valid) {
                    addPostSurveyRespondentRow(data);
                    importCount++;
                } else {
                    errorLines.push(lineIdx + 1);
                }
            });

            overlay.remove();
            let msg = `已匯入 ${importCount} 筆填答`;
            if (errorLines.length > 0) {
                msg += `（第 ${errorLines.join(', ')} 列格式有誤，需為 12 欄，已略過）`;
            }
            showToast(msg, errorLines.length > 0 ? 'warning' : 'success');
        };
    }

    function saveParentingPostSurveyData() {
        const recordId = window.currentSurveyRecordId;
        if (!recordId) return;

        const yearVal = document.getElementById('parentingYear').value;
        const monthVal = window.currentSurveyMonth;

        const rows = document.querySelectorAll('#postSurveyInputBody tr');
        const responses = [];
        const invalidCells = [];
        rows.forEach(tr => {
            const resp = {};
            for (let q = 1; q <= 7; q++) {
                const inp = tr.querySelector(`.post-survey-q-input[data-q="${q}"]`);
                const raw = inp ? inp.value.trim() : '';
                if (!/^[1-5]$/.test(raw)) {
                    if (inp) {
                        inp.style.borderColor = '#e74c3c';
                        setTimeout(() => { inp.style.borderColor = '#ccc'; }, 1200);
                    }
                    const rowNo = (tr.querySelector('.post-survey-row-num') || {}).textContent || '?';
                    invalidCells.push(`第${rowNo}列Q${q}`);
                } else {
                    resp['Q' + q] = parseInt(raw, 10);
                }
            }
            
            const chks = tr.querySelectorAll('.post-survey-svc-chk');
            chks.forEach(chk => {
                resp['轉介_' + chk.dataset.key] = chk.checked ? 1 : '';
            });

            const socialCountInput = tr.querySelector('.post-survey-social-count');
            let socialCount = parseInt(socialCountInput ? socialCountInput.value : '', 10);
            if (isNaN(socialCount) || socialCount < 0) socialCount = 0;
            if (socialCount > 5) socialCount = 5;
            resp[POST_SURVEY_SOCIAL_COUNT_KEY] = socialCount > 0 ? socialCount : '';

            responses.push(resp);
        });

        if (invalidCells.length > 0) {
            showToast('Q1~Q7 僅可填 1~5 且不可空白，請修正：' + invalidCells.slice(0, 6).join('、') + (invalidCells.length > 6 ? '...' : ''), 'error');
            return;
        }

        const payload = {
            recordId: recordId,
            year: yearVal,
            month: monthVal,
            responses: responses
        };

        showLoading();
        google.script.run
            .withSuccessHandler(res => {
                hideLoading();
                if (res && res.status === 'success') {
                    showToast(res.message || '課後問卷資料已儲存');
                    parentingPostSurveyIsDirty = false;
                    onSurveyMonthChanged();
                } else {
                    alert('儲存失敗：' + (res ? res.message : '伺服器未回傳錯誤訊息'));
                }
            })
            .withFailureHandler(err => {
                hideLoading();
                showToast('儲存課後問卷出錯: ' + err.message, 'error');
            })
            .saveParentingPostSurvey(payload);
    }

    function clearAllPostSurveyRows() {
        const tbody = document.getElementById('postSurveyInputBody');
        if (tbody.children.length === 0) return;
        
        if (!confirm('確定要清空目前所有的課後問卷資料嗎？（清空後需點擊「儲存」才會生效）')) {
            return;
        }

        tbody.innerHTML = '';
        updatePostSurveyRespondentCount();
        parentingPostSurveyIsDirty = true;
    }

    /**
     * 月份變更 → 載入統計展示區
     */
    function onSurveyMonthChanged() {
        const month = window.currentSurveyMonth;
        const displayDiv = document.getElementById('parentingSurveyDisplayWrapper');

        if (!month || !displayDiv) {
            return;
        }

        const monthNum = parseInt(month);
        const item = currentParentingTopicsData.find(d => parseInt(d.month) === monthNum);
        if (!item) {
            return;
        }

        const rid = item.recordId || item.RecordId;
        if (!rid) {
            document.getElementById('surveyDisplaySummary').textContent = '該月份尚無講題資料。';
            renderServiceStatsRow({});
            return;
        }

        const yearVal = document.getElementById('parentingYear').value;
        const mmStr = String(monthNum).padStart(2, '0');
        document.getElementById('surveyDisplayTitle').textContent = `滿意度問卷統計分析 (${yearVal}年${mmStr}月)`;
        document.getElementById('surveyDisplaySummary').textContent = '統計計算中...';

        google.script.run
            .withSuccessHandler(res => {
                if (!res || res.status !== 'success' || !res.data) {
                    document.getElementById('surveyDisplaySummary').textContent = '尚無問卷填答資料。';
                    document.getElementById('surveyDisplayBody').innerHTML = '';
                    renderServiceStatsRow({});
                    return;
                }
                renderSurveyDisplay(res.data, item);
            })
            .withFailureHandler(err => {
                document.getElementById('surveyDisplaySummary').textContent = '統計載入失敗: ' + err.message;
                renderServiceStatsRow({});
            })
            .getParentingSurveyStats(rid);
    }

    function renderServiceStatsRow(services) {
        const svcBody = document.getElementById('surveyDisplayServices');
        if (!svcBody) return;
        const row = svcBody.querySelector('tr');
        if (!row) return;
        const cells = row.children;
        const svcKeys = ['婚姻諮商', '個人心理', '家事商談', '兒少團體', '社工諮詢'];
        svcKeys.forEach((key, i) => {
            if (!cells[i]) return;
            cells[i].textContent = (services && services[key]) ? services[key] : 0;
        });
    }

    function renderSurveyDisplay(stats, item) {
        const total = stats.totalResponses || 0;
        const attend = item.attendCount || 0;
        const rate = attend > 0 ? Math.round((total / attend) * 100) : 0;

        document.getElementById('surveyDisplaySummary').innerHTML =
            `參與初階親職教育課程講座家長填寫滿意度問卷進行統計分析，` +
            `參與人數 <strong style="color: var(--secondary);">${attend}</strong> 人，` +
            `回收問卷共計 <strong style="color: var(--secondary);">${total}</strong> 份，` +
            `回收率 <strong style="color: var(--secondary);">${rate}%</strong>。統計分析如下：`;

        const questionTexts = [
            "1. 課程使我更加瞭解「調解案件的司法程序與法律知識」",
            "2. 課程讓我認識「孩子在家庭衝突中會有的身心反應」",
            "3. 課程使我知道什麼是「友善合作的父母」",
            "4. 課程使我學習到「合作照顧孩子的方式及技巧」",
            "5. 課程讓我知道遇到家庭紛爭時可尋求協助的管道"
        ];
        const optLabels = ['非常同意', '同意', '普通', '不同意', '非常不同意', '未填答'];
        const tbody = document.getElementById('surveyDisplayBody');
        tbody.innerHTML = '';

        (stats.questions || []).forEach((qData, idx) => {
            const tr = document.createElement('tr');
            const tdQ = document.createElement('td');
            tdQ.style.cssText = 'border: 1px solid #ddd; padding: 5px 8px; font-size: 0.85rem; line-height: 1.3;';
            tdQ.textContent = questionTexts[idx] || `Q${idx + 1}`;
            tr.appendChild(tdQ);

            optLabels.forEach(label => {
                const td = document.createElement('td');
                td.style.cssText = 'border: 1px solid #ddd; padding: 4px; text-align: center; font-size: 0.85rem;';
                const count = (qData.counts && qData.counts[label]) || 0;
                const pct = (qData.percents && qData.percents[label]) || 0;
                td.innerHTML = `<strong>${count}</strong><div style="font-size:0.7rem; color:#888;">(${pct}%)</div>`;
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });

        renderServiceStatsRow(stats.services || {});
    }


    // 初始化與事件監聽
    document.addEventListener('DOMContentLoaded', () => {
        // 監聽視窗重設大小
        window.addEventListener('resize', scheduleConnectorRedraw);

        // ★ 強力監聽：使用 ResizeObserver 監控容器尺寸變化 (對 DevTools F12 特別有效)
        const container = document.getElementById('parentingTopicsContainer');
        if (window.ResizeObserver && container) {
            const ro = new ResizeObserver(() => {
                // 稍微延遲一點確保 layout 已經穩定
                scheduleConnectorRedraw();
            });
            ro.observe(container);
        }
        
        // ★ 當視窗重新獲得焦點時也重繪 (處理切換視窗回來的情境)
        window.addEventListener('focus', scheduleConnectorRedraw);
        
        // 監聽主容器捲動
        const mainContainer = document.querySelector('.stats-container');
        if (mainContainer) {
            mainContainer.addEventListener('scroll', scheduleConnectorRedraw, { passive: true });
        }

        // ★ 也監聽表格容器的 scroll 監聽
        const tableWrapper = document.getElementById('parentingTopicsTableWrapper');
        if (tableWrapper) {
            tableWrapper.addEventListener('scroll', scheduleConnectorRedraw, { passive: true });
        }

        // ★ 也監聽 window scroll (有些環境 iframe 會需要)
        window.addEventListener('scroll', scheduleConnectorRedraw, { passive: true });
    });
</script>
