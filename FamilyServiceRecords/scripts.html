<script>
    // ================================================================
    // scripts.html - 前端主邏輯
    // ================================================================

    // ==================== 全域變數 ====================
    let currentUser = null;
    let allOptions = {};
    let allRecords = [];
    let currentPage = 1;
    let allMeetingRecords = [];
    let currentMeetingPage = 1;
    const PAGE_SIZE = 12;
    // 系統密碼 (Base64 編碼混淆)
    const _p = 'REDACTED_PASSWORD';
    let isAuthenticated = false;

    // 專注模式狀態
    let isFocusMode = false;

    // 個案姓名遮蔽功能
    function maskName(name) {
        if (!name || name.length <= 1) return name;
        if (name.length === 2) return name[0] + 'O';
        return name[0] + 'O'.repeat(name.length - 2) + name[name.length - 1];
    }

    function getDisplayName(record) {
        const name = record['個案姓名'] || '';
        if (!currentUser || !currentUser.name) return name;
        if (record['服務社工'] === currentUser.name) return name;
        return maskName(name);
    }

    // Emoji 對應表 (僅前端顯示用，不影響後端資料)
    const emojiMap = {
        '服務方式': {
            '面談': '🗣️ 面談',
            '電談': '📞 電談',
            '書面': '📨 書面',
            '電談-聯繫未果': '📞❌ 電談-聯繫未果'
        },
        '會面-服務方式': {
            '面談': '🗣️ 面談',
            '電談': '📞 電談',
            '書面': '📨 書面',
            '電談-聯繫未果': '📞❌ 電談-聯繫未果',
            '訪視': '🏠 訪視'
        },
        '個案來源': {
            '接受轉介-司法系統': '⚖️ 接受轉介-司法系統',
            '接受轉介-社會處': '🏢 接受轉介-社會處',
            '接受轉介-民間團體': '🕊️ 接受轉介-民間團體',
            '自行求助': '🙋🏻 自行求助',
            '自行求助-網絡諮詢': '🌐 自行求助-網絡諮詢'
        },
        '服務項目': {
            '陪同出庭': '👩🏻‍⚖️ 陪同出庭',
            '諮詢服務': '💬 諮詢服務'
        }
    };

    // ==================== 專注模式 ====================
    /**
     * 切換專注模式
     * @param {boolean|undefined} enable - true 進入專注模式, false 退出, undefined 切換
     */
    function toggleFocusMode(enable) {
        const container = document.getElementById('records-tab');
        if (!container) return;

        if (enable === undefined) {
            isFocusMode = !isFocusMode;
        } else {
            isFocusMode = enable;
        }

        container.classList.toggle('focus-mode', isFocusMode);

        // 進入專注模式：捲動到預覽面板
        if (isFocusMode) {
            setTimeout(() => {
                const previewPanel = document.getElementById('previewPanel');
                if (previewPanel) {
                    previewPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 100);
        } else {
            // 退出專注模式：清空預覽內容，顯示 placeholder
            resetPreviewPanel();
        }
    }

    /**
     * 重設預覽面板到初始狀態
     */
    function resetPreviewPanel() {
        const placeholder = document.querySelector('.preview-placeholder');
        const previewContent = document.getElementById('previewContent');

        if (placeholder) placeholder.style.display = 'flex';
        if (previewContent) previewContent.style.display = 'none';

        // 取消選中的列
        document.querySelectorAll('.records-table tbody tr.selected').forEach(tr => {
            tr.classList.remove('selected');
        });

        // 重設狀態
        currentPreviewId = null;
        previewHasChanges = false;

        // 隱藏未儲存提示
        const indicator = document.getElementById('unsavedIndicator');
        if (indicator) indicator.classList.add('hidden');
    }

    // ESC 鍵監聽
    document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && isFocusMode) {
            e.preventDefault();

            // 檢查是否有未儲存的變更
            if (previewHasChanges) {
                const action = confirm('有未儲存的變更，是否要儲存？\n\n按「確定」儲存後關閉\n按「取消」捨棄變更');
                if (action) {
                    // 儲存變更
                    savePreviewChanges();
                }
                // 不管選什麼都退出專注模式
            }

            toggleFocusMode(false);
        }
    });

    // ==================== 密碼驗證 ====================
    function checkPassword() {
        const input = document.getElementById('systemPassword');
        const error = document.getElementById('passwordError');

        if (input.value === atob(_p)) {
            isAuthenticated = true;
            document.getElementById('passwordModal').style.display = 'none';
            // 密碼正確，開始初始化系統
            initializeApp();
            setupFormEvents();
        } else {
            error.style.display = 'block';
            input.value = '';
            input.focus();
            // 震動效果
            input.style.animation = 'shake 0.5s';
            setTimeout(() => { input.style.animation = ''; }, 500);
        }
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', function () {
        // 等待密碼驗證後才初始化
        document.getElementById('systemPassword').focus();
    });

    // 關閉所有頁籤的預覽面板並退出專注模式
    function closeAllPreviewPanels() {
        // 服務紀錄 - 關閉預覽
        currentPreviewId = null;
        const srPlaceholder = document.querySelector('#previewPanel .preview-placeholder');
        const srContent = document.getElementById('previewContent');
        if (srPlaceholder) srPlaceholder.style.display = '';
        if (srContent) srContent.style.display = 'none';
        if (typeof toggleFocusMode === 'function') toggleFocusMode(false);

        // 會面紀錄 - 關閉預覽
        if (typeof resetMeetingPreviewPanel === 'function') resetMeetingPreviewPanel();
        if (typeof toggleMeetingFocusMode === 'function') toggleMeetingFocusMode(false);

        // 會面執行 - 關閉預覽
        if (typeof resetMeetingExecutionPreviewPanel === 'function') resetMeetingExecutionPreviewPanel();
        if (typeof toggleMeetingExecutionFocusMode === 'function') toggleMeetingExecutionFocusMode(false);

        // 清除所有表格選取狀態
        document.querySelectorAll('.records-table tbody tr').forEach(tr => tr.classList.remove('selected'));
        
        // 初階親職報表 - 關閉預覽
        if (typeof closeParentingPreviewPanel === 'function') closeParentingPreviewPanel();
    }

    // 直接切換頁籤的函數
    function switchTab(el, tabId) {
        // 相容性處理：如果只傳入一個參數且為字串 (舊版呼叫方式)
        if (typeof el === 'string' && tabId === undefined) {
            tabId = el;
            el = null;
        }
        console.log('Switching to tab:', tabId);

        // 1. 清除所有按鈕的樣式
        const container = document.getElementById('sidebarNav');
        if (container) {
            const buttons = container.querySelectorAll('.nav-item');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                btn.style.background = '';
                btn.style.color = '';
                btn.style.borderLeft = '';
                btn.style.fontWeight = '';
            });
        }

        // 2. 設定被點擊按鈕的樣式
        if (el && typeof el !== 'string') {
            el.classList.add('active');
            el.style.background = 'rgba(255, 255, 255, 0.2)';
            el.style.color = 'white';
            el.style.borderLeft = '4px solid white';
            el.style.fontWeight = '600';
            console.log('Active style applied to:', el.innerText);
        } else {
            // Fallback
            const targetBtn = document.querySelector(`.nav-item[data-tab="${tabId}"]`);
            if (targetBtn) {
                targetBtn.classList.add('active');
                targetBtn.style.background = 'rgba(255, 255, 255, 0.2)';
                targetBtn.style.color = 'white';
                targetBtn.style.borderLeft = '4px solid white';
                targetBtn.style.fontWeight = '600';
            }
        }

        // 防呆提示：如果在初階親職有未儲存變更，要詢問是否離開
        if (typeof parentingHasUnsavedChanges !== 'undefined' && parentingHasUnsavedChanges && tabId !== 'parenting' && tabId !== 'stats') {
            const action = confirm('初階親職報表有未儲存的變更，確定要放棄變更離開嗎？\n\n按「確定」放棄變更並離開\n按「取消」留在本頁');
            if (!action) return;
            parentingHasUnsavedChanges = false;
        }

        // 切換頁籤前：關閉所有預覽面板、退出所有專注模式
        closeAllPreviewPanels();

        // 切換頁籤面板
        document.querySelectorAll('.tab-panel').forEach(panel => {
            if (panel.id === tabId + '-tab') {
                panel.classList.add('active');
                panel.style.display = 'block';
            } else {
                panel.classList.remove('active');
                panel.style.display = 'none';
            }
        });

        // 如果是切換到 stats，預設顯示子頁籤
        if (tabId === 'stats') {
            switchStatsSub('stats');
        }

        // 切換頁籤內容初始化
        if (tabId === 'admin' && typeof currentUser !== 'undefined' && currentUser.role === 'admin') {
            loadUsers();
            loadSocialWorkerSettings();
        } else if (tabId === 'meeting') {
            // 每次切換到會面紀錄頁籤都清空搜尋結果，需要手動查詢
            allMeetingRecords = [];
            totalMeetingRecordCount = 0;
            currentMeetingPage = 1;
            showMeetingEmptyMessage('請選擇查詢條件後點擊「查詢」');
            resetMeetingPreviewPanel();
        } else if (tabId === 'meeting-execution') {
            // 切換到會面執行頁籤，清空搜尋結果
            allMeetingExecutionRecords = [];
            totalMeetingExecutionRecordCount = 0;
            currentMeetingExecutionPage = 1;
            showMeetingExecutionEmptyMessage('請選擇查詢條件後點擊「查詢」');
            resetMeetingExecutionPreviewPanel();
        } else if (tabId === 'records') {
            // 切換回服務紀錄頁籤，也清空搜尋結果
            allRecords = [];
            totalRecordCount = 0;
            currentPage = 1;
            showEmptyMessage('請選擇查詢條件後點擊「查詢」');
            resetPreviewChanges();
        }
    }

    // ==================== Tag Input 處理 ====================
    function handleTagInputEnter(event, containerId) {
        if (event.key === 'Enter') {
            event.preventDefault(); // 阻止表單送出
            const inputElement = event.target;
            const value = inputElement.value.trim();
            if (value) {
                addTag(containerId, value);
                inputElement.value = '';

                // 標記變更 (如果是預覽面板的修改)
                if (containerId.startsWith('preview-tag-container-')) {
                    markMeetingExecutionPreviewChanged();
                }
            }
        }
    }

    function addTag(containerId, value) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const wrapper = container.querySelector('.tags-wrapper');
        if (!wrapper) return;

        // 避免重複標籤 (選擇性，目前允許同名)
        // const existingTags = Array.from(wrapper.querySelectorAll('.tag-item span')).map(el => el.textContent);
        // if (existingTags.includes(value)) return;

        const tagEl = document.createElement('div');
        tagEl.className = 'tag-item';
        tagEl.innerHTML = `
            <span>${value}</span>
            <span class="remove-tag" onclick="removeTag(this, '${containerId}')">&times;</span>
        `;
        wrapper.appendChild(tagEl);
    }

    function removeTag(element, containerId) {
        element.parentElement.remove();
        if (containerId.startsWith('preview-tag-container-')) {
            markMeetingExecutionPreviewChanged();
        }
    }

    function getTagValues(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return [];
        const wrapper = container.querySelector('.tags-wrapper');
        if (!wrapper) return [];

        return Array.from(wrapper.querySelectorAll('.tag-item span:first-child')).map(el => el.textContent);
    }

    function clearTags(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const wrapper = container.querySelector('.tags-wrapper');
        if (!wrapper) return;
        wrapper.innerHTML = '';
    }

    // 初始化事件監聽已移除，改用 inline onclick

    function initializeApp() {
        showLoading();

        // 初始化後端並取得使用者資訊
        google.script.run
            .withSuccessHandler(function (result) {
                console.log('初始化成功');
                loadUserInfo();
            })
            .withFailureHandler(function (error) {
                hideLoading();
                showToast('初始化失敗: ' + error.message, 'error');
            })
            .initializeSpreadsheet();
    }

    function loadUserInfo() {
        google.script.run
            .withSuccessHandler(function (user) {
                currentUser = user;
                document.getElementById('currentUserName').textContent = user.name || user.email;

                const roleElement = document.getElementById('currentUserRole');
                roleElement.textContent = user.role === 'admin' ? '管理者' : '使用者';
                roleElement.className = 'role-badge ' + user.role;

                // 顯示管理員頁籤
                if (user.role === 'admin') {
                    document.getElementById('adminTab').style.display = 'flex';
                    loadUsers();

                }

                // 載入選項
                loadOptions();
            })
            .withFailureHandler(function (error) {
                hideLoading();
                showToast('載入使用者資訊失敗: ' + error.message, 'error');
            })
            .getCurrentUser();
    }

    function loadOptions() {
        google.script.run
            .withSuccessHandler(function (options) {
                allOptions = options;
                initializeFormOptions();

                initializeYearOptions();
                initializeFilterOptions(); // 初始化篩選器
                hideLoading();
                // 預設不載入資料，顯示提示訊息
                showEmptyMessage('請選擇查詢條件後點擊「查詢」');
            })
            .withFailureHandler(function (error) {
                hideLoading();
                showToast('載入選項失敗: ' + error.message, 'error');
            })
            .getAllOptions();
    }

    // 初始化篩選器選項 (社工)
    function initializeFilterOptions() {
        // --- 服務紀錄 ---
        const socialWorkerSelect = document.getElementById('filterSocialWorker');
        if (socialWorkerSelect && allOptions['服務社工']) {
            socialWorkerSelect.innerHTML = '<option value="">全部</option>';
            allOptions['服務社工'].forEach(opt => {
                if (opt !== '系統管理員') {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    socialWorkerSelect.appendChild(option);
                }
            });
        }

        // --- 會面紀錄 ---
        const meetingSocialWorkerSelect = document.getElementById('meetingFilterSocialWorker');
        if (meetingSocialWorkerSelect && allOptions['服務社工']) {
            meetingSocialWorkerSelect.innerHTML = '<option value="">全部</option>';
            allOptions['服務社工'].forEach(opt => {
                if (opt !== '系統管理員') {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    meetingSocialWorkerSelect.appendChild(option);
                }
            });
        }
    }

    function initializeYearOptions() {
        const yearSelect = document.getElementById('filterYear');
        const meetingYearSelect = document.getElementById('meetingFilterYear');
        const meetingExecutionYearSelect = document.getElementById('meetingExecutionFilterYear');
        const statsYearSelect = document.getElementById('statsYear');
        const parentingYearSelect = document.getElementById('parentingYear');
        const currentYear = new Date().getFullYear();
        // 提供未來 2 年的選項，並限制最舊顯示到 2024年 (民國113年)
        for (let y = currentYear + 2; y >= 2024; y--) {
            const option = document.createElement('option');
            option.value = y;
            option.textContent = y + '年';
            if (y === currentYear) option.selected = true;
            if (yearSelect) yearSelect.appendChild(option);

            const meetingOption = document.createElement('option');
            meetingOption.value = y;
            meetingOption.textContent = y + '年';
            if (y === currentYear) meetingOption.selected = true;
            if (meetingYearSelect) meetingYearSelect.appendChild(meetingOption);

            // 會面執行年份
            const meetingExOption = document.createElement('option');
            meetingExOption.value = y;
            meetingExOption.textContent = y + '年';
            if (y === currentYear) meetingExOption.selected = true;
            if (meetingExecutionYearSelect) meetingExecutionYearSelect.appendChild(meetingExOption);

            // 統計報表年份（顯示民國年）
            if (statsYearSelect) {
                const statsOption = document.createElement('option');
                statsOption.value = y;
                statsOption.textContent = (y - 1911) + '年 (' + y + ')';
                // 預設選擇當年
                if (y === currentYear) {
                    statsOption.selected = true;
                }
                statsYearSelect.appendChild(statsOption);
            }

            // 初階親職報表年份（顯示民國年）
            if (parentingYearSelect) {
                const parentingOption = document.createElement('option');
                parentingOption.value = y - 1911; // 傳遞民國年給後端
                parentingOption.textContent = (y - 1911) + '年 (' + y + ')';
                // 預設選擇當年
                if (y === currentYear) {
                    parentingOption.selected = true;
                }
                parentingYearSelect.appendChild(parentingOption);
            }
        }
    }

    function showEmptyMessage(message) {
        const tbody = document.getElementById('recordsTableBody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="7" class="empty-message">' + message + '</td></tr>';
        const pagination = document.getElementById('pagination');
        if (pagination) pagination.innerHTML = '';
    }

    function showMeetingEmptyMessage(message) {
        const tbody = document.getElementById('meetingRecordsTableBody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="empty-message">' + message + '</td></tr>';
        const pagination = document.getElementById('meetingPagination');
        if (pagination) pagination.innerHTML = '';
    }

    // ==================== 事件監聽器 ====================
    // Legacy functions removed

    // ==================== 表單選項初始化 ====================
    function initializeFormOptions() {
        // --- 服務紀錄 ---
        const selectFields = [
            '個案來源', '個案身分', '指定性別',
            '服務社工', '服務方式', '服務主題', '服務項目',
            '轉介單位', '轉介項目'
        ];

        selectFields.forEach(field => {
            const select = document.getElementById(field);
            if (!select) return;

            select.innerHTML = '<option value="">請選擇</option>';

            const options = allOptions[field] || []; // 移除在案社工特殊處理
            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = (emojiMap[field] && emojiMap[field][opt]) || opt;
                select.appendChild(option);
            });
        });

        // 篩選器的服務社工選項
        const filterWorker = document.getElementById('filterSocialWorker');
        if (filterWorker) {
            filterWorker.innerHTML = '<option value="">全部</option>';
            (allOptions['服務社工'] || []).forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                filterWorker.appendChild(option);
            });
        }

        // 多選欄位 (Checkbox) - 聯繫和轉介改用階層式選單
        const multiFields = ['陪同出庭', '人身安全', '專業諮詢-法律', '專業諮詢-社福', '會談服務', '通報'];

        multiFields.forEach(field => {
            const container = document.getElementById(field + '-checkboxes');
            if (!container) return;

            container.innerHTML = '';

            const options = allOptions[field] || [];
            options.forEach((opt, index) => {
                const item = document.createElement('div');
                item.className = 'checkbox-item';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = field + '_' + index;
                checkbox.value = opt;

                const label = document.createElement('label');
                label.htmlFor = field + '_' + index;
                label.textContent = opt;

                item.appendChild(checkbox);
                item.appendChild(label);
                container.appendChild(item);
            });
        });

        // ==============================================
        // --- 會面紀錄 ---
        // ==============================================

        // 單選欄位
        const meetingSelectFields = [
            { id: '會面指定性別', key: '指定性別' },
            { id: '會面服務方式', key: '會面-服務方式' },
            { id: '會面個案身分', key: '會面-個案身分' },
            { id: '會面轉介單位', key: '會面-轉介單位' },
            { id: '會面服務社工', key: '服務社工' },
            { id: '會面服務主題', key: '會面-服務主題' },
            // 預覽版 單選欄位
            { id: 'meetingPreview指定性別', key: '指定性別' },
            { id: 'meetingPreview服務方式', key: '會面-服務方式' },
            { id: 'meetingPreview個案身分', key: '會面-個案身分' },
            { id: 'meetingPreview轉介單位', key: '會面-轉介單位' },
            { id: 'meetingPreview服務社工', key: '服務社工' },
            { id: 'meetingPreview服務主題', key: '會面-服務主題' }
        ];

        meetingSelectFields.forEach(item => {
            const select = document.getElementById(item.id);
            if (!select) return;
            select.innerHTML = '<option value="">請選擇</option>';
            const options = allOptions[item.key] || [];
            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = (emojiMap[item.key] && emojiMap[item.key][opt]) || opt;
                select.appendChild(option);
            });
        });

        // 多選欄位 (Checkbox)
        const meetingMultiFields = [
            { id: '會面交往交付', key: '交往交付' },
            { id: '會面專業諮詢-法律', key: '專業諮詢-法律' },
            { id: '會面專業諮詢-社福', key: '會面-專業諮詢-社福' },
            { id: '會面會談服務', key: '會面-會談服務' },
            { id: '會面通報', key: '通報' }
        ];

        meetingMultiFields.forEach(item => {
            const container = document.getElementById(item.id + '-checkboxes');
            if (!container) return;
            container.innerHTML = '';
            const options = allOptions[item.key] || [];
            options.forEach((opt, index) => {
                const div = document.createElement('div');
                div.className = 'checkbox-item';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = item.id + '_' + index;
                checkbox.value = opt;
                const label = document.createElement('label');
                label.htmlFor = item.id + '_' + index;
                label.textContent = opt;
                div.appendChild(checkbox);
                div.appendChild(label);
                container.appendChild(div);
            });
        });

        // ==============================================
        // --- 會面執行 ---
        // ==============================================
        const meetingExecutionSelectFields = [
            { id: '會面執行執行方式', key: '執行方式' },
            { id: '會面執行案件類型', key: '案件類型' },
            { id: 'meetingExecutionPreview執行方式', key: '執行方式' },
            { id: 'meetingExecutionPreview案件類型', key: '案件類型' }
        ];

        meetingExecutionSelectFields.forEach(item => {

                option.value = opt;
                option.textContent = opt;
                select.appendChild(option);

        const meetingExecutionMultiFields = [

        ];

                div.className = 'checkbox-item';

                checkbox.type = 'checkbox';

        initHierarchicalFields();

        // 初始化單選階層式欄位 (國籍別, preview國籍別, 會面國籍別, meetingPreview國籍別)
        initSingleHierarchicalFields();

    // ==================== 單選階層式欄位 ====================

        '國籍別': '',
        'preview國籍別': '',
        '會面國籍別': '',
        'meetingPreview國籍別': ''
    };

    const fieldIdMapping = {
        '國籍別': '國籍別',
        'preview國籍別': 'preview國籍別',
        '會面國籍別': '會面國籍別',

    };

    // 解析選項為階層結構 (單選用)
    function parseSingleOptionsToHierarchy(field) {
        // 取得對應的選項 key
        const optionKey = fieldIdMapping[field];
        const options = allOptions[optionKey] || [];
        const hierarchy = {
            categories: new Map(), // Map<categoryName, Set<subcategory>>
            standalone: []         // 獨立選項 (無 - 分隔)
        };

        // 第一輪：識別帶 - 的類別
        const baseFieldName = field.replace('preview', '');
        options.forEach(opt => {
            if (opt.includes('-')) {
                const dashIndex = opt.indexOf('-');
                const category = opt.substring(0, dashIndex);
                const subcategory = opt.substring(dashIndex + 1);

                // 服務主題和接受轉介項目的「其他」改為獨立自填，不建立細項
                if ((baseFieldName === '服務主題' || baseFieldName === '接受轉介項目') && category === '其他') {
                    return;
                }

                if (!hierarchy.categories.has(category)) {
                    hierarchy.categories.set(category, new Set());
                }
                hierarchy.categories.get(category).add(subcategory);
            }
        });

        // 第二輪：加入獨立選項，但排除已作為類別存在的
        options.forEach(opt => {
            if (!opt.includes('-')) {
                // 如果這個選項名稱已經是一個類別（有子選項），則跳過
                if (hierarchy.categories.has(opt)) {
                    return;
                }
                hierarchy.standalone.push(opt);
            }
        });

        singleHierarchicalData[field] = hierarchy;

        // 填充類別選項
        const categorySelect = document.getElementById(field + '-category');
        if (!categorySelect) return;

        categorySelect.innerHTML = '<option value="">選擇類別</option>';

        // 先加入獨立選項 (當作可直接選擇的類別)
        hierarchy.standalone.forEach(opt => {
            const option = document.createElement('option');
            option.value = '__direct__:' + opt;
            option.textContent = opt;
            categorySelect.appendChild(option);
        });

        // 再加入帶子項的類別
        hierarchy.categories.forEach((subs, cat) => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat + ' ▸';  // 加箭頭表示有子選項
            categorySelect.appendChild(option);
        });

        // 如果沒有任何帶子項的類別，隱藏細項選單和自填
        const subcatEl = document.getElementById(field + '-subcategory');
        const customEl = document.getElementById(field + '-custom');
        if (hierarchy.categories.size === 0) {
            if (subcatEl) subcatEl.style.display = 'none';
            // 自填只在需要時才由事件處理器顯示
        }
    }

    // 設定單選階層式選單事件
    function setupSingleHierarchicalEvents(field) {
        const categorySelect = document.getElementById(field + '-category');
        const subcategorySelect = document.getElementById(field + '-subcategory');
        const customInput = document.getElementById(field + '-custom');
        const displayDiv = document.getElementById(field + '-display');
        const hiddenInput = document.getElementById(fieldIdMapping[field]);

        if (!categorySelect) return;

        // 類別變更時
        categorySelect.addEventListener('change', function () {
            const value = this.value;
            subcategorySelect.innerHTML = '<option value="">選擇細項</option>';
            customInput.style.display = 'none';
            customInput.value = '';

            // 標記國籍欄位被手動修改 (排除載入時的程式觸發)
            if (field === '國籍別' && !isLoadingData) _nationalityManuallyChanged = true;
            if (field === 'preview國籍別' && !isLoadingData) _previewNationalityManuallyChanged = true;

            // 直接選項 (不需要子選項)
            if (value.startsWith('__direct__:')) {
                const directValue = value.replace('__direct__:', '');

                // 特殊處理：需要自填的獨立選項
                const bf = field.replace('preview', '');
                if ((bf === '轉案股別單位' && directValue === '民團') ||
                    (bf === '服務主題' && directValue === '其他')) {
                    subcategorySelect.style.display = 'none';
                    customInput.style.display = 'block';
                    customInput.placeholder = bf === '轉案股別單位' ? '請輸入民團名稱...' : '請輸入內容...';
                    customInput.value = '';
                    customInput.focus();
                    setSingleFieldValue(field, ''); // 等待輸入
                    return;
                }

                subcategorySelect.disabled = true;
                setSingleFieldValue(field, directValue);
                return;
            }

            if (!value) {
                subcategorySelect.disabled = true;
                setSingleFieldValue(field, '');
                return;
            }

            subcategorySelect.style.display = ''; // 恢復顯示

            subcategorySelect.disabled = false;

            // 顯示該類別下的細項
            const subcategories = singleHierarchicalData[field].categories.get(value);
            if (subcategories) {
                subcategories.forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub;
                    option.textContent = sub;
                    subcategorySelect.appendChild(option);
                });
            }
            // 新增「其他」選項用於自填
            const otherOption = document.createElement('option');
            otherOption.value = '__other__';
            otherOption.textContent = '其他 (自填)';
            subcategorySelect.appendChild(otherOption);

            // 暫時清除選擇
            setSingleFieldValue(field, '');
        });

        // 細項變更時
        subcategorySelect.addEventListener('change', function () {
            const categoryValue = categorySelect.value;
            const subcategoryValue = this.value;

            if (subcategoryValue === '__other__') {
                customInput.style.display = 'block';
                customInput.focus();
                setSingleFieldValue(field, '');
            } else if (subcategoryValue) {
                customInput.style.display = 'none';
                customInput.value = '';
                const fullValue = categoryValue + '-' + subcategoryValue;
                setSingleFieldValue(field, fullValue);
            } else {
                customInput.style.display = 'none';
                customInput.value = '';
                setSingleFieldValue(field, '');
            }
        });

        // 自填輸入時 (即時更新)
        customInput.addEventListener('input', function () {
            let categoryValue = categorySelect.value;
            // 去掉 __direct__: 前綴（如「民團」的自填情境）
            if (categoryValue.startsWith('__direct__:')) {
                categoryValue = categoryValue.replace('__direct__:', '');
            }
            const customValue = this.value.trim();
            if (customValue) {
                const fullValue = categoryValue + '-' + customValue;
                setSingleFieldValue(field, fullValue);
            } else {
                setSingleFieldValue(field, '');
            }
        });

        // 按 Enter 確認自填
        customInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                this.blur();
            }
        });
    }

    // 設定單選欄位的值並更新顯示
    function setSingleFieldValue(field, value) {
        selectedSingleValues[field] = value;
        const displayDiv = document.getElementById(field + '-display');
        const hiddenInput = document.getElementById(fieldIdMapping[field]);

        if (hiddenInput) {
            hiddenInput.value = value;
        }

        if (displayDiv) {
            if (value) {
                displayDiv.innerHTML = `<span class="selected-value-tag">${value} <button type="button" class="clear-btn" onclick="clearSingleFieldValue('${field}')">&times;</button></span>`;
            } else {
                displayDiv.innerHTML = '';
            }
        }
    }

    // 清除單選欄位的值
    function clearSingleFieldValue(field) {
        const categorySelect = document.getElementById(field + '-category');
        const subcategorySelect = document.getElementById(field + '-subcategory');
        const customInput = document.getElementById(field + '-custom');

        if (categorySelect) categorySelect.value = '';
        if (subcategorySelect) {
            subcategorySelect.value = '';
            subcategorySelect.disabled = true;
            subcategorySelect.innerHTML = '<option value="">選擇細項</option>';
        }
        if (customInput) {
            customInput.value = '';
            customInput.style.display = 'none';
        }

        setSingleFieldValue(field, '');
    }

    // 載入單選階層式欄位的值
    function loadSingleFieldValue(field, value, simulateChangeEvent = true) {
        if (!value) {
            clearSingleFieldValue(field);
            return;
        }

        const categorySelect = document.getElementById(field + '-category');
        const subcategorySelect = document.getElementById(field + '-subcategory');
        const customInput = document.getElementById(field + '-custom');

        if (!categorySelect) return;

        // --- 國籍別 舊資料相容層 ---
        let processedValue = value;
        let isNationalityField = field.includes('國籍別');

        if (isNationalityField && value) {
            // 如果是舊的外國籍寫法 (例如: 外國籍-緬甸)
            if (value.startsWith('外國籍-')) {
                // 檢查是否在新選項中 (外國籍-越南, 外國籍-印尼)
                const subcategory = value.replace('外國籍-', '外國籍-'); // 其實就等於 value
                const nationalityData = singleHierarchicalData['國籍別'];
                if (!nationalityData.categories.get('外國籍').has(subcategory)) {
                    // 如果不在預設裡 (例如: 緬甸)，我們要把分類設為 "外國籍"，細項設為 "緬甸" (自填)
                    processedValue = '外國籍-' + value.replace('外國籍-', '');
                } else {
                    processedValue = '外國籍-' + subcategory;
                }
            }
            // 如果是舊的本國籍寫法 (例如: 本國籍-原籍菲律賓)
            else if (value.startsWith('本國籍-原籍')) {
                const subcategory = value.replace('本國籍-', ''); // 原籍菲律賓
                const nationalityData = singleHierarchicalData['國籍別'];
                if (!nationalityData.categories.get('本國籍(新住民)').has(subcategory)) {
                    processedValue = '本國籍(新住民)-' + subcategory;
                } else {
                    processedValue = '本國籍(新住民)-' + subcategory;
                }
            }
            // 如果是舊的 本國籍原住民 (沒有減號)
            else if (value === '本國籍原住民') {
                processedValue = '本國籍-原住民';
            }
            // 如果只有 本國籍
            else if (value === '本國籍') {
                processedValue = '本國籍-一般';
            }
            // 如果只有 大陸籍
            else if (value === '大陸籍') {
                processedValue = '外國籍-大陸籍'; // 新設計中 大陸籍 被放在 外國籍 底下
            }
        }

        const baseField = field.replace('preview', '');



        // 檢查是否是帶 - 的階層值
        if (processedValue.includes('-')) {
            const dashIndex = processedValue.indexOf('-');
            const category = processedValue.substring(0, dashIndex);
            const subcategory = processedValue.substring(dashIndex + 1);

            // 設定類別
            categorySelect.value = category;
            if (simulateChangeEvent) categorySelect.dispatchEvent(new Event('change'));

            // 稍後設定子類別 (等 change 事件處理完)
            setTimeout(() => {
                // 檢查子類別是否在選項中
                let found = false;
                for (let i = 0; i < subcategorySelect.options.length; i++) {
                    if (subcategorySelect.options[i].value === subcategory) {
                        subcategorySelect.value = subcategory;
                        found = true;
                        break;
                    }
                }
                // 如果沒找到，使用自填
                if (!found && subcategory) {
                    subcategorySelect.value = '__other__';
                    if (simulateChangeEvent) subcategorySelect.dispatchEvent(new Event('change'));
                    customInput.value = subcategory;
                    if (simulateChangeEvent) customInput.dispatchEvent(new Event('input'));
                } else {
                    if (simulateChangeEvent) subcategorySelect.dispatchEvent(new Event('change'));
                }
            }, 50);
        } else {
            // 獨立選項
            categorySelect.value = '__direct__:' + processedValue;
            if (simulateChangeEvent) categorySelect.dispatchEvent(new Event('change'));
        }
    }

    // 重設所有單選階層式欄位
    function resetSingleHierarchicalFields() {
        const fields = ['國籍別'];
        fields.forEach(field => {
            clearSingleFieldValue(field);
        });
    }

    // 取得單選欄位的值 (用於儲存)
    function getSingleFieldValue(field) {
        return selectedSingleValues[field] || '';
    }


    // ==================== 階層式選單 (聯繫/轉介) ====================

    // 儲存已解析的階層結構
    const hierarchicalData = {};
    // 儲存已選擇的值
    const selectedHierarchicalValues = {
        '聯繫': [],
        '轉介': [],
        '會面聯繫': [],
        '會面轉介': []
    };

    // 初始化所有階層式欄位
    function initHierarchicalFields() {
        ['聯繫', '轉介'].forEach(field => {
            parseOptionsToHierarchy(field);
            setupHierarchicalEvents(field);
        });
        // 會面紀錄的聯繫/轉介共用同樣的選項資料
        ['會面聯繫', '會面轉介'].forEach(field => {
            // 從共用選項複製階層資料
            const baseField = field.replace('會面', ''); // '聯繫' or '轉介'
            hierarchicalData[field] = hierarchicalData[baseField];
            // 填充會面表單的下拉選單
            populateHierarchicalCategory(field);
            setupHierarchicalEvents(field);
        });
    }

    // 填充階層式選單的第一層類別 (用於會面紀錄的聯繫/轉介)
    function populateHierarchicalCategory(field) {
        const hierarchy = hierarchicalData[field];
        if (!hierarchy) return;

        const categorySelect = document.getElementById(field + '-category');
        if (!categorySelect) return;

        categorySelect.innerHTML = '<option value="">選擇類別</option>';

        // 新增帶 - 的類別
        hierarchy.categories.forEach((subs, cat) => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat + ' ▸';
            categorySelect.appendChild(option);
        });

        // 獨立選項直接加入第一層
        hierarchy.standalone.forEach(opt => {
            const option = document.createElement('option');
            option.value = '__direct__:' + opt;
            option.textContent = opt;
            categorySelect.appendChild(option);
        });

        // 新增「其他」類別
        if (!hierarchy.categories.has('其他')) {
            const option = document.createElement('option');
            option.value = '__other_category__';
            option.textContent = '其他 ▸';
            categorySelect.appendChild(option);
        }
    }

    // 解析選項為階層結構
    function parseOptionsToHierarchy(field) {
        const options = allOptions[field] || [];
        const hierarchy = {
            categories: new Map(), // Map<categoryName, Set<subcategory>>
            standalone: []         // 獨立選項 (無 - 分隔)
        };

        options.forEach(opt => {
            if (opt.includes('-')) {
                const dashIndex = opt.indexOf('-');
                const category = opt.substring(0, dashIndex);
                const subcategory = opt.substring(dashIndex + 1);

                if (!hierarchy.categories.has(category)) {
                    hierarchy.categories.set(category, new Set());
                }
                hierarchy.categories.get(category).add(subcategory);
            } else {
                hierarchy.standalone.push(opt);
            }
        });

        hierarchicalData[field] = hierarchy;

        // 填充類別選項
        const categorySelect = document.getElementById(field + '-category');
        if (!categorySelect) return;

        categorySelect.innerHTML = '<option value="">選擇類別</option>';

        // 如果選項中已經有 "其他"，先移除，以免重複 (我們會在後面手動加入帶有特殊邏輯的 "其他 ▸")
        if (hierarchy.categories.has('其他')) {
            hierarchy.categories.delete('其他');
        }
        hierarchy.standalone = hierarchy.standalone.filter(opt => opt !== '其他');

        // 新增帶 - 的類別
        hierarchy.categories.forEach((subs, cat) => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat + ' ▸';
            categorySelect.appendChild(option);
        });

        // 修改：獨立選項直接加入第一層 (不分組)
        hierarchy.standalone.forEach(opt => {
            const option = document.createElement('option');
            option.value = '__direct__:' + opt;
            option.textContent = opt;
            categorySelect.appendChild(option);
        });

        // 修改：新增固定的「其他」類別
        if (!hierarchy.categories.has('其他')) {
            const option = document.createElement('option');
            option.value = '__other_category__';
            option.textContent = '其他 ▸';
            categorySelect.appendChild(option);
        }
    }

    // 設定階層式選單事件
    function setupHierarchicalEvents(field) {
        const categorySelect = document.getElementById(field + '-category');
        const subcategorySelect = document.getElementById(field + '-subcategory');
        const customInput = document.getElementById(field + '-custom');

        if (!categorySelect) return;

        // 類別變更時載入細項
        categorySelect.addEventListener('change', function () {
            const category = this.value;
            subcategorySelect.innerHTML = '<option value="">選擇細項</option>';
            customInput.style.display = 'none';
            customInput.value = '';

            if (!category) {
                subcategorySelect.disabled = true;
                return;
            }

            // 修改：處理獨立選項 (直接值) - 隱藏細項選單
            if (category.startsWith('__direct__:')) {
                subcategorySelect.disabled = true;
                subcategorySelect.style.display = 'none'; // 隱藏
                return;
            }

            // 修改：處理「其他」類別 (直接顯示輸入框) - 隱藏細項選單
            if (category === '__other_category__' || category === '其他') {
                subcategorySelect.disabled = true; // 不需要細項
                subcategorySelect.style.display = 'none'; // 隱藏
                customInput.style.display = 'block';
                customInput.placeholder = '請輸入內容...';
                customInput.focus();
                return;
            }

            subcategorySelect.disabled = false;
            subcategorySelect.style.display = ''; // 恢復顯示

            // 顯示該類別下的細項
            const subcategories = hierarchicalData[field].categories.get(category);
            if (subcategories) {
                subcategories.forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub;
                    option.textContent = sub;
                    subcategorySelect.appendChild(option);
                });
            }
            // 新增「其他」選項用於自填
            const otherOption = document.createElement('option');
            otherOption.value = '__other__';
            otherOption.textContent = '其他 (自填)';
            subcategorySelect.appendChild(otherOption);
        });

        // 細項變更時處理自填
        subcategorySelect.addEventListener('change', function () {
            if (this.value === '__other__') {
                customInput.style.display = 'block';
                customInput.focus();
            } else {
                customInput.style.display = 'none';
                customInput.value = '';
            }
        });
    }

    // 新增階層式選項
    function addHierarchicalItem(field) {
        const categorySelect = document.getElementById(field + '-category');
        const subcategorySelect = document.getElementById(field + '-subcategory');
        const customInput = document.getElementById(field + '-custom');

        const category = categorySelect.value;
        let subcategory = subcategorySelect.value;

        if (!category) {
            showToast('請先選擇類別', 'warning');
            return;
        }

        if (category.startsWith('__direct__:')) {
            // 獨立選項不需要細項
        } else if (category === '__other_category__' || category === '其他') {
            // 其他類別檢查輸入框，在下方處理
        } else if (!subcategory) {
            showToast('請選擇細項', 'warning');
            return;
        }

        // 處理自填
        if (subcategory === '__other__') {
            subcategory = customInput.value.trim();
            if (!subcategory) {
                showToast('請輸入自訂內容', 'warning');
                customInput.focus();
                return;
            }
        }

        // 組合完整值
        let fullValue;
        if (category.startsWith('__direct__:')) {
            fullValue = category.replace('__direct__:', '');
        } else if (category === '__other_category__' || category === '其他') {
            // 其他類別直接取用輸入值
            const customVal = customInput.value.trim();
            if (!customVal) {
                showToast('請輸入自訂內容', 'warning');
                customInput.focus();
                return;
            }
            fullValue = '其他-' + customVal;
        } else {
            fullValue = category + '-' + subcategory;
        }

        // 檢查重複
        if (selectedHierarchicalValues[field].includes(fullValue)) {
            showToast('此選項已存在', 'warning');
            return;
        }

        // 新增到已選擇列表
        selectedHierarchicalValues[field].push(fullValue);
        updateHierarchicalTags(field);
        updateHierarchicalHiddenValue(field);

        // 重置選擇
        categorySelect.value = '';
        subcategorySelect.innerHTML = '<option value="">選擇細項</option>';
        subcategorySelect.disabled = true;
        customInput.style.display = 'none';
        customInput.value = '';

        showToast('已新增: ' + fullValue, 'success');
    }

    // 移除階層式選項
    function removeHierarchicalItem(field, value) {
        const index = selectedHierarchicalValues[field].indexOf(value);
        if (index > -1) {
            selectedHierarchicalValues[field].splice(index, 1);
            updateHierarchicalTags(field);
            updateHierarchicalHiddenValue(field);
        }
    }

    // 更新標籤顯示
    function updateHierarchicalTags(field) {
        const container = document.getElementById(field + '-selected-tags');
        if (!container) return;

        container.innerHTML = '';
        selectedHierarchicalValues[field].forEach(value => {
            const tag = document.createElement('span');
            tag.className = 'selected-tag';
            tag.innerHTML = `
                ${value}
                <button type="button" class="remove-tag" onclick="removeHierarchicalItem('${field}', '${value.replace(/'/g, "\\'")}')">✕</button>
            `;
            container.appendChild(tag);
        });
    }

    // 更新隱藏欄位值
    function updateHierarchicalHiddenValue(field) {
        const hiddenInput = document.getElementById(field + '-values');
        if (hiddenInput) {
            hiddenInput.value = selectedHierarchicalValues[field].join(';');
        }
    }

    // 載入已有的階層式值 (編輯時用)
    function loadHierarchicalValues(field, values) {
        selectedHierarchicalValues[field] = [];

        if (typeof values === 'string') {
            values = values.split(';').map(s => s.trim()).filter(Boolean);
        }

        if (Array.isArray(values)) {
            selectedHierarchicalValues[field] = values;
        }

        updateHierarchicalTags(field);
        updateHierarchicalHiddenValue(field);
    }

    // 清空階層式選擇 (新增表單時用)
    function clearHierarchicalFields() {
        ['聯繫', '轉介'].forEach(field => {
            selectedHierarchicalValues[field] = [];
            updateHierarchicalTags(field);
            updateHierarchicalHiddenValue(field);

            const categorySelect = document.getElementById(field + '-category');
            const subcategorySelect = document.getElementById(field + '-subcategory');
            const customInput = document.getElementById(field + '-custom');

            if (categorySelect) categorySelect.value = '';
            if (subcategorySelect) {
                subcategorySelect.innerHTML = '<option value="">選擇細項</option>';
                subcategorySelect.disabled = true;
            }
            if (customInput) {
                customInput.style.display = 'none';
                customInput.value = '';
            }
        });
    }

    // ==================== 服務紀錄 CRUD ====================
    let totalRecordCount = 0;  // 總筆數由後端提供

    function loadRecords() {
        showLoading();

        const filters = getFilters();

        google.script.run
            .withSuccessHandler(function (result) {
                // 新的 API 回傳格式: { records, totalCount, page, pageSize }
                allRecords = result.records || [];
                totalRecordCount = result.totalCount || 0;
                currentPage = result.page || 1;

                renderRecordsTable();
                hideLoading();
            })
            .withFailureHandler(function (error) {
                hideLoading();
                showToast('載入紀錄失敗: ' + error.message, 'error');
            })
            .getRecords(filters, currentPage, PAGE_SIZE);
    }

    function getFilters() {
        const filters = {};

        const year = document.getElementById('filterYear').value;
        const month = document.getElementById('filterMonth').value;
        const socialWorker = document.getElementById('filterSocialWorker').value;
        const caseName = document.getElementById('filterCaseName').value;

        if (year) filters.year = parseInt(year);
        if (month) filters.month = parseInt(month);
        if (socialWorker) filters['服務社工'] = socialWorker;
        if (caseName) filters['個案姓名'] = caseName;

        return filters;
    }

    function searchRecords() {
        const filters = getFilters();
        // 必須至少選擇一個條件
        if (!filters.year && !filters['個案姓名']) {
            showToast('請至少選擇年份或輸入個案姓名', 'error');
            return;
        }
        currentPage = 1;
        loadRecords();
    }

    function resetFilters() {
        document.getElementById('filterYear').value = '';
        document.getElementById('filterMonth').value = '';
        document.getElementById('filterSocialWorker').value = '';
        document.getElementById('filterCaseName').value = '';
        currentPage = 1;
        allRecords = [];
        showEmptyMessage('請選擇查詢條件後點擊「查詢」');
    }

    function renderRecordsTable() {
        const tbody = document.getElementById('recordsTableBody');

        // 確保 allRecords 是陣列
        if (!allRecords || !Array.isArray(allRecords)) {
            allRecords = [];
        }

        if (allRecords.length === 0 && totalRecordCount === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-message">尚無資料，請點擊「新增紀錄」開始</td></tr>';
            renderPagination(0);
            // 重設預覽面板
            currentPreviewId = null;
            document.getElementById('previewContent').style.display = 'none';
            document.querySelector('.preview-placeholder').style.display = 'flex';
            return;
        }

        // 後端已經做完分頁，直接渲染 allRecords
        tbody.innerHTML = allRecords.map(record => `
    <tr data-record-id="${record['RecordId'] || ''}" onclick="showPreview('${record['RecordId'] || ''}')">
      <td data-label="服務日期">${formatDate(record['服務日期'])}</td>
      <td data-label="個案姓名">${getDisplayName(record)}</td>
      <td data-label="個案身分">${record['個案身分'] || ''}</td>
      <td data-label="服務社工">${record['服務社工'] || ''}</td>
      <td data-label="服務方式">${(emojiMap['服務方式'] && emojiMap['服務方式'][record['服務方式']]) || record['服務方式'] || ''}</td>
      <td data-label="操作" class="action-cell">
        <button class="btn btn-info btn-sm" onclick="event.stopPropagation(); editRecord('${record['RecordId'] || ''}')" title="編輯">✏️</button>
        <button class="btn btn-success btn-sm" onclick="event.stopPropagation(); copyRecord('${record['RecordId'] || ''}')" title="複製">📋</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); confirmDeleteRecord('${record['RecordId'] || ''}')" title="刪除">🗑️</button>
      </td>
    </tr>
  `).join('');

        // 使用後端回傳的總筆數
        renderPagination(totalRecordCount);
    }

    function renderPagination(totalCount) {
        const pagination = document.getElementById('pagination');
        const totalPages = Math.ceil(totalCount / PAGE_SIZE);

        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = `<span style="margin-right: 10px;">共 ${totalCount} 筆，第 ${currentPage}/${totalPages} 頁</span>`;

        // 上一頁
        if (currentPage > 1) {
            html += `<button onclick="goToPage(${currentPage - 1})">◀ 上一頁</button>`;
        }

        // 首頁
        if (currentPage > 3) {
            html += `<button onclick="goToPage(1)">1</button>`;
            if (currentPage > 4) {
                html += `<span style="padding: 0 5px;">...</span>`;
            }
        }

        // 顯示當前頁附近 ±2 頁
        const startPage = Math.max(1, currentPage - 2);
        const endPage = Math.min(totalPages, currentPage + 2);

        for (let i = startPage; i <= endPage; i++) {
            const active = i === currentPage ? 'active' : '';
            html += `<button class="${active}" onclick="goToPage(${i})">${i}</button>`;
        }

        // 末頁
        if (currentPage < totalPages - 2) {
            if (currentPage < totalPages - 3) {
                html += `<span style="padding: 0 5px;">...</span>`;
            }
            html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
        }

        // 下一頁
        if (currentPage < totalPages) {
            html += `<button onclick="goToPage(${currentPage + 1})">下一頁 ▶</button>`;
        }

        pagination.innerHTML = html;
    }

    function goToPage(page) {
        currentPage = page;
        loadRecords();  // 後端分頁，需要重新載入
    }

    // 確保下拉選單中有指定的值 (如果沒有則新增)
    function ensureOptionExists(elementId, value) {
        if (!value) return;
        const select = document.getElementById(elementId);
        if (!select) return;

        // 檢查是否存在
        let exists = false;
        for (let i = 0; i < select.options.length; i++) {
            if (select.options[i].value === value) {
                exists = true;
                break;
            }
        }

        // 不存在則新增
        if (!exists) {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = value;
            select.appendChild(option);
        }
    }

    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe.toString()
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function renderMeetingExecutionTable(records) {
        const tbody = document.getElementById('meetingExecutionTableBody');

        const maskName = (name) => {
            if (!name) return '';
            const len = name.length;
            if (len === 1) return name;
            if (len === 2) return name[0] + 'O';
            return name[0] + 'O'.repeat(len - 2) + name[len - 1];
        };

        let html = '';
        records.forEach(record => {
            const dateStr = record['執行日期'] ? new Date(record['執行日期']).toLocaleDateString('zh-TW') : '';
            const partiesArray = [];
            if (Array.isArray(record['未成年子女(男)']) && record['未成年子女(男)'].length > 0) partiesArray.push(...record['未成年子女(男)']);
            if (Array.isArray(record['未成年子女(女)']) && record['未成年子女(女)'].length > 0) partiesArray.push(...record['未成年子女(女)']);


            // 進行姓名遮蔽處理
            const maskedParties = partiesArray.map(name => maskName(name));
            const partiesStr = maskedParties.join(', ');

            const workers = Array.isArray(record['執行人員']) ? record['執行人員'].join(', ') : (record['執行人員'] || '');

            html += `
                <tr onclick="showMeetingExecutionPreview('${record.RecordId}')">
                    <td>${dateStr}</td>
                    <td>${escapeHtml(record['會面分案案號'] || '')}</td>
                    <td title="${escapeHtml(partiesStr)}">${escapeHtml(partiesStr.length > 15 ? partiesStr.substring(0, 15) + '...' : partiesStr)}</td>
                    <td>${escapeHtml(workers)}</td>
                    <td onclick="event.stopPropagation()">
                        <button class="action-btn edit-btn" onclick="editMeetingExecutionRecord('${record.RecordId}')" title="編輯">✎</button>
                        <button class="action-btn copy-btn" onclick="copyMeetingExecutionRecord('${record.RecordId}')" title="複製新增">📋</button>
                        <button class="action-btn delete-btn" onclick="confirmDeleteMeetingExecutionRecord('${record.RecordId}')" title="刪除">🗑️</button>
                    </td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
    }

    function renderMeetingExecutionPagination(currentPage, totalPages) {
        const pagination = document.getElementById('meetingExecutionPagination');
        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = '';
        if (currentPage > 1) html += `<button onclick="goToMeetingExecutionPage(${currentPage - 1})">◀ 上一頁</button>`;

        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

        if (startPage > 1) {
            html += `<button onclick="goToMeetingExecutionPage(1)">1</button>`;
            if (startPage > 2) html += `<span style="padding: 0 5px;">...</span>`;
        }

        for (let i = startPage; i <= endPage; i++) {
            const active = i === currentPage ? 'active' : '';
            html += `<button class="${active}" onclick="goToMeetingExecutionPage(${i})">${i}</button>`;
        }

        if (endPage < totalPages) {
            if (endPage < totalPages - 1) html += `<span style="padding: 0 5px;">...</span>`;
            html += `<button onclick="goToMeetingExecutionPage(${totalPages})">${totalPages}</button>`;
        }

        if (currentPage < totalPages) html += `<button onclick="goToMeetingExecutionPage(${currentPage + 1})">下一頁 ▶</button>`;
        pagination.innerHTML = html;
    }

    function goToMeetingExecutionPage(page) {

    function renderMeetingRecordsTable() {
        const tbody = document.getElementById('meetingRecordsTableBody');
        if (!allMeetingRecords || !Array.isArray(allMeetingRecords)) {
            allMeetingRecords = [];
        }

        if (allMeetingRecords.length === 0 && totalMeetingRecordCount === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-message">尚無資料，請點擊「新增紀錄」開始</td></tr>';
            renderMeetingPagination(0);
            resetMeetingPreviewPanel();
            return;
        }

        tbody.innerHTML = allMeetingRecords.map(record => `
    <tr data-record-id="${record['RecordId'] || ''}" onclick="showMeetingPreview('${record['RecordId'] || ''}')">
      <td data-label="服務日期">${formatDate(record['服務日期'])}</td>
      <td data-label="會面分案案號">${record['會面分案案號'] || ''}</td>

        <button class="btn btn-success btn-sm" onclick="event.stopPropagation(); copyMeetingRecord('${record['RecordId'] || ''}')" title="複製">📋</button>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); confirmDeleteMeetingRecord('${record['RecordId'] || ''}')" title="刪除">🗑️</button>
      </td>
    </tr>
  `).join('');

        renderMeetingPagination(totalMeetingRecordCount);
    }

    function renderMeetingPagination(totalCount) {
        const pagination = document.getElementById('meetingPagination');
        const totalPages = Math.ceil(totalCount / PAGE_SIZE);

        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = `<span style="margin-right: 10px;">共 ${totalCount} 筆，第 ${currentMeetingPage}/${totalPages} 頁</span>`;

        if (currentMeetingPage > 1) html += `<button onclick="goToMeetingPage(${currentMeetingPage - 1})">◀ 上一頁</button>`;
        if (currentMeetingPage > 3) {
            html += `<button onclick="goToMeetingPage(1)">1</button>`;
            if (currentMeetingPage > 4) html += `<span style="padding: 0 5px;">...</span>`;
        }

        const startPage = Math.max(1, currentMeetingPage - 2);
        const endPage = Math.min(totalPages, currentMeetingPage + 2);

        for (let i = startPage; i <= endPage; i++) {
            const active = i === currentMeetingPage ? 'active' : '';
            html += `<button class="${active}" onclick="goToMeetingPage(${i})">${i}</button>`;
        }

        if (currentMeetingPage < totalPages - 2) {
            if (currentMeetingPage < totalPages - 3) html += `<span style="padding: 0 5px;">...</span>`;
            html += `<button onclick="goToMeetingPage(${totalPages})">${totalPages}</button>`;
        }

        if (currentMeetingPage < totalPages) html += `<button onclick="goToMeetingPage(${currentMeetingPage + 1})">下一頁 ▶</button>`;

        pagination.innerHTML = html;
    }

    function goToMeetingPage(page) {

    // 儲存會面紀錄 (新增/編輯)
    function saveMeetingRecord() {
        const form = document.getElementById('meetingForm');
        if (!form.checkValidity()) { form.reportValidity(); return; }

        const nat = getSingleFieldValue('會面國籍別');
        if (!nat || nat.trim() === '') {
            showToast('請填寫必填欄位：國籍別', 'error');
            return;
        }

        const recordId = document.getElementById('meetingRecordId').value;
        const recordData = {
            '服務日期': document.getElementById('會面服務日期').value,
            '會面分案案號': document.getElementById('會面會面分案案號').value,
            '個案姓名': document.getElementById('會面個案姓名').value,
            '指定性別': document.getElementById('會面指定性別').value,
            '服務方式': document.getElementById('會面服務方式').value,
            '個案身分': document.getElementById('會面個案身分').value,
            '國籍別': _meetingNationalityManuallyChanged ? nat : (_originalRawMeetingNationality || nat),
            '司法案號': document.getElementById('會面司法案號').value,
            '在案與否': document.getElementById('會面在案與否').value === 'true',
            '在案單位社工': document.getElementById('會面在案單位社工').value,
            '轉介單位': document.getElementById('會面轉介單位').value,
            '服務社工': document.getElementById('會面服務社工').value,
            '服務主題': document.getElementById('會面服務主題').value
        };

        const multiFields = [
            { id: '會面交往交付', key: '交往交付' },
            { id: '會面專業諮詢-法律', key: '專業諮詢-法律' },
            { id: '會面專業諮詢-社福', key: '專業諮詢-社福' },
            { id: '會面會談服務', key: '會談服務' },
            { id: '會面通報', key: '通報' }
        ];
        multiFields.forEach(item => {
            const checked = [];
            const escapedField = CSS.escape(item.id);
            document.querySelectorAll(`#${escapedField}-checkboxes input[type="checkbox"]:checked`).forEach(cb => {
                checked.push(cb.value);
            });
            recordData[item.key] = checked;
        });

        recordData['聯繫'] = selectedHierarchicalValues['會面聯繫'] || [];
        recordData['轉介'] = selectedHierarchicalValues['會面轉介'] || [];

        showLoading();

        if (recordId) {
            google.script.run
                .withSuccessHandler(function (result) {
                    hideLoading();
                    closeMeetingModal();
                    showToast(result.message, 'success');
                    if (getMeetingFilters().year || getMeetingFilters()['個案姓名']) {
                        loadMeetingRecords();
                    }
                })
                .withFailureHandler(function (error) {
                    hideLoading();
                    showToast('更新會面紀錄失敗: ' + error.message, 'error');
                })
                .updateMeetingRecord(recordId, recordData);
        } else {
            google.script.run
                .withSuccessHandler(function (result) {
                    hideLoading();
                    closeMeetingModal();
                    showToast(result.message + ' (請使用查詢條件查看)', 'success');
                    if (getMeetingFilters().year || getMeetingFilters()['個案姓名']) {
                        loadMeetingRecords();
                    } else {
                        showMeetingEmptyMessage('新增成功！請選擇查詢條件後點擊「查詢」查看紀錄');
                    }
                })
                .withFailureHandler(function (error) {
                    hideLoading();
                    showToast('新增會面紀錄失敗: ' + error.message, 'error');
                })
                .createMeetingRecord(recordData);
        }
    }

        const previewContent = document.getElementById('meetingPreviewContent');

            if (!confirm('目前有未儲存的變更，確定要切換到其他紀錄嗎？')) { return; }
            resetMeetingPreviewChanges();
        }
        if (currentMeetingPreviewId === recordId) return;

        currentMeetingPreviewId = recordId;
        document.querySelectorAll('#meetingRecordsTableBody tr').forEach(tr => {
            tr.classList.toggle('selected', tr.dataset.recordId === recordId);

        ensureOptionExists('meetingPreview服務社工', record['服務社工']); document.getElementById('meetingPreview服務社工').value = record['服務社工'] || '';

            { id: 'meetingPreview專業諮詢-社福', key: '專業諮詢-社福' },
            { id: 'meetingPreview會談服務', key: '會談服務' },
            { id: 'meetingPreview聯繫', key: '聯繫' },
            { id: 'meetingPreview轉介', key: '轉介' },
            { id: 'meetingPreview通報', key: '通報' }
        ];
        mf.forEach(item => {

    function saveMeetingPreviewChanges() {
        const recordId = document.getElementById('meetingPreviewRecordId').value;
        if (!recordId) return;

        const nat = getSingleFieldValue('meetingPreview國籍別');

        const recordData = {
            '服務日期': document.getElementById('meetingPreview服務日期').value,
            '會面分案案號': document.getElementById('meetingPreview會面分案案號').value,
            '個案姓名': document.getElementById('meetingPreview個案姓名').value,
            '指定性別': document.getElementById('meetingPreview指定性別').value,
            '服務方式': document.getElementById('meetingPreview服務方式').value,
            '個案身分': document.getElementById('meetingPreview個案身分').value,
            '國籍別': _previewMeetingNationalityManuallyChanged ? nat : _previewOriginalRawMeetingNationality,
            '司法案號': document.getElementById('meetingPreview司法案號').value,
            '在案與否': document.getElementById('meetingPreview在案與否').value === 'true',
            '在案單位社工': document.getElementById('meetingPreview在案單位社工').value,
            '轉介單位': document.getElementById('meetingPreview轉介單位').value,
            '服務社工': document.getElementById('meetingPreview服務社工').value,
            '服務主題': document.getElementById('meetingPreview服務主題').value
        };

        const originalRecord = allMeetingRecords.find(r => r.RecordId === recordId);
        if (originalRecord) {
            ['交往交付', '專業諮詢-法律', '專業諮詢-社福', '會談服務', '聯繫', '轉介', '通報'].forEach(f => {
                recordData[f] = originalRecord[f];
            });
        }

        showLoading();
        google.script.run
            .withSuccessHandler(function (result) {
                hideLoading();
                showToast(result.message, 'success');
                resetMeetingPreviewChanges();
                const idx = allMeetingRecords.findIndex(r => r.RecordId === recordId);
                if (idx !== -1) Object.assign(allMeetingRecords[idx], recordData);
                renderMeetingRecordsTable();
            })
            .withFailureHandler(function (error) {
                hideLoading();
                showToast('儲存失敗: ' + error.message, 'error');
            })
            .updateMeetingRecord(recordId, recordData);
    }

    function loadUsers() {
        google.script.run
            .withSuccessHandler(function (users) {
                renderUsersTable(users);
            })
            .withFailureHandler(function (error) {
                showToast('載入使用者失敗: ' + error.message, 'error');
            })
            .getAllUsers();

    function renderUsersTable(users) {
        const tbody = document.getElementById('usersTableBody');

        // 防禦性檢查
        if (!users || !Array.isArray(users)) {
            console.warn('收到無效的使用者資料:', users);
            users = [];
        }

        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-message">尚無使用者</td></tr>';
            return;
        }

        tbody.innerHTML = users.map(user => `
    <tr>
      <td>${user.email}</td>
      <td>${user.name || ''}</td>
      <td>${user.role === 'admin' ? '管理者' : '使用者'}</td>
      <td>${user.status}</td>
      <td>
        <button class="btn btn-info btn-sm" onclick="toggleUserStatus('${user.email}', '${user.status === '啟用' ? '停用' : '啟用'}')">
          ${user.status === '啟用' ? '🔒 停用' : '🔓 啟用'}
        </button>
      </td>
    </tr>
  `).join('');
    }

    function formatDate(dateValue) {
        if (!dateValue) return '';
        const date = new Date(dateValue);
        if (isNaN(date.getTime())) return '';

        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function formatDateForInput(date) {
        if (!date || isNaN(date.getTime())) return '';

        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    let currentReportHtml = '';

    function generateReport() {
        const yearSelect = document.getElementById('statsYear');
        const monthSelect = document.getElementById('statsMonth');

        if (!yearSelect.value) {
            showToast('請選擇年份', 'warning');
            return;
        }

        const year = parseInt(yearSelect.value);
        const month = monthSelect.value;

        // 顯示載入中
        document.getElementById('statsReportContainer').style.display = 'none';
        document.getElementById('statsLoading').style.display = 'flex';

        google.script.run
            .withSuccessHandler(function (result) {
                document.getElementById('statsLoading').style.display = 'none';
                document.getElementById('statsReportContainer').style.display = 'block';

                if (result && result.html) {
                    currentReportHtml = result.html;

                    // 使用 iframe 顯示報表
                    const container = document.getElementById('statsReportContainer');
                    container.innerHTML = '<div class="stats-report-content"><iframe id="reportFrame"></iframe></div>';

                    const iframe = document.getElementById('reportFrame');
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    iframeDoc.open();
                    iframeDoc.write(result.html);
                    iframeDoc.close();

                    // 自動調整 iframe 高度
                    iframe.onload = function () {
                        try {
                            iframe.style.height = (iframeDoc.body.scrollHeight + 50) + 'px';
                        } catch (e) {
                            iframe.style.height = '1200px';
                        }
                    };

                    showToast('報表產生成功！共 ' + result.totalCount + ' 筆資料', 'success');
                } else {
                    document.getElementById('statsReportContainer').innerHTML =
                        '<div class="stats-placeholder"><span>📊</span><p>沒有符合條件的資料</p></div>';
                }
            })
            .withFailureHandler(function (error) {
                document.getElementById('statsLoading').style.display = 'none';
                document.getElementById('statsReportContainer').style.display = 'block';
                document.getElementById('statsReportContainer').innerHTML =
                    '<div class="stats-placeholder"><span>❌</span><p>報表產生失敗: ' + error.message + '</p></div>';
                showToast('報表產生失敗: ' + error.message, 'error');
            })
            .generateStatisticsReport(year, month);
    }

    function printReport() {
        const iframe = document.getElementById('reportFrame');
        if (!iframe) {
            showToast('請先產生報表', 'warning');
            return;
        }

        try {
            const iframeWindow = iframe.contentWindow;
            iframeWindow.focus();
            iframeWindow.print();
        } catch (e) {
            // 如果無法直接列印 iframe，開啟新視窗
            const printWindow = window.open('', '_blank');
            printWindow.document.write(currentReportHtml);
            printWindow.document.close();
            printWindow.focus();
            printWindow.print();
        }
    }

                const group = document.getElementById('在案單位社工Group');
                if (group) {

                }
            });

                const isCase = this.value === 'true';

        // 個案來源 變更 → 條件顯示轉介單位/轉介項目
        const sourceSelect = document.getElementById('個案來源');
        if (sourceSelect) {

                const sourceVal = this.value;
                const hasSource = !!sourceVal && sourceVal !== '自行求助' && sourceVal !== '自行求助-網絡諮詢';
                const refUnitGroup = document.getElementById('轉介單位Group');
                const refItemGroup = document.getElementById('轉介項目Group');
                if (refUnitGroup) refUnitGroup.style.display = hasSource ? 'block' : 'none';
                if (refItemGroup) refItemGroup.style.display = hasSource ? 'block' : 'none';
                // 沒有轉介需求時清空已選值
                if (!hasSource) {
                    const refUnitSelect = document.getElementById('轉介單位');
                    const refItemSelect = document.getElementById('轉介項目');
                    if (refUnitSelect) refUnitSelect.value = '';
                    if (refItemSelect) refItemSelect.value = '';
                }
            });
        }

        // 服務項目 變更 → 陪同出庭時鎖定服務方式為面談，且隱藏聯繫欄位
        const serviceItemSelect = document.getElementById('服務項目');
        const serviceMethodSelect = document.getElementById('服務方式');
        if (serviceItemSelect && serviceMethodSelect) {
            serviceItemSelect.addEventListener('change', function () {
                const isCourtAttendance = this.value === '陪同出庭';
                if (isCourtAttendance) {
                    // 鎖定為面談
                    serviceMethodSelect.value = '面談';
                    serviceMethodSelect.disabled = true;

                    serviceMethodSelect.disabled = false;

                const contactGroup = document.getElementById('聯繫FormGroup');
                if (contactGroup) contactGroup.style.display = isCourtAttendance ? 'none' : '';
            });

        container.innerHTML = settings.map(worker => {

                badge = '<span class="role-badge admin" style="margin-left:5px; font-size: 0.7rem;">系統</span>';
            } else if (worker.source === 'system_managed') {
                badge = '<span class="role-badge admin" style="margin-left:5px; font-size: 0.7rem; opacity: 0.7;">系統(已隱藏)</span>';
            } else {
                badge = '<span class="role-badge" style="background:#95a5a6; color:white; margin-left:5px; font-size: 0.7rem;">外部</span>';
                // 只有手動新增的可以刪除

            <div class="checkbox-item social-worker-item" style="display: flex; align-items: center; padding: 5px;">
                <input type="checkbox" id="sw_${worker.name}" value="${worker.name}" ${worker.isVisible ? 'checked' : ''} style="margin-right: 8px;">
                <label for="sw_${worker.name}" style="cursor: pointer; display: flex; align-items: center; flex-grow: 1;">${worker.name} ${badge}</label>

            </div>
            `;
        }).join('');
    }

        // 重新讀取資料時，關閉右側面板避免顯示舊資料
        closeParentingPreviewPanel();
        
        if (parentingHasUnsavedChanges) {
